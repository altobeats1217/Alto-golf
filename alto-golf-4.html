// Merge two sessions' club results by summing raw shot counts per club and
// recomputing each club's score from the combined counts (so the merged
// score reflects all shots, not an average of two averages).
function mergeClubResults(clubsA, clubsB) {
  const merged = {};
  const allClubs = new Set([...Object.keys(clubsA), ...Object.keys(clubsB)]);
  allClubs.forEach((club) => {
    const counts = emptyCounts();
    RESULT_TYPES.forEach((t) => {
      counts[t.key] = (clubsA[club]?.[t.key] || 0) + (clubsB[club]?.[t.key] || 0);
    });
    merged[club] = { ...counts, score: computeClubScore(counts) };
  });
  return merged;
}

function mergeDistResults(distsA, distsB) {
  const merged = {};
  const allDists = new Set([...Object.keys(distsA), ...Object.keys(distsB)]);
  allDists.forEach((dist) => {
    const counts = emptyDistCounts();
    DIST_RESULT_TYPES.forEach((t) => {
      counts[t.key] = (distsA[dist]?.[t.key] || 0) + (distsB[dist]?.[t.key] || 0);
    });
    merged[dist] = { ...counts, score: computeDistScore(counts) };
  });
  return merged;
}

function computeOverallScore(clubs) {
  const entries = Object.values(clubs);
  return entries.length ? entries.reduce((sum, c) => sum + c.score, 0) / entries.length : 0;
}

// ---------- Alto(admin) — the default mascot friend ----------
const ALTO_ADMIN_NICKNAME = 'Alto(admin)';

// Week-seeded LCG so every client computes the same "random" values for the week
function weekSeed() {
  const now = new Date();
  // Daily seed — changes every day so Alto's scores visibly fluctuate
  const startOfYear = new Date(now.getFullYear(), 0, 1);
  const day = Math.floor((now - startOfYear) / (24 * 3600 * 1000));
  return now.getFullYear() * 1000 + day;
}
function seededRand(seed, index) {
  let s = (seed * 1664525 + index * 22695477 + 1013904223) & 0xffffffff;
  s = (s >>> 0) / 0xffffffff;
  return s;
}

// Generate Alto's weekly summary (24 sessions over past 6 months, scores 60-92, nice 40-78%)
function generateAltoSummary() {
  const seed = weekSeed();
  const now = new Date();

  // 20 sessions going backward from 4-7 days ago, spaced 5-10 days apart
  // This guarantees the most recent session is always in the past (4-7 days ago)
  const latestOffset = 4 + Math.round(seededRand(seed, 77) * 3); // 4-7 days ago
  const sessions = [];
  let daysAgo = latestOffset;
  let score = 68 + Math.round(seededRand(seed, 0) * 14);
  let rate  = 0.48 + seededRand(seed, 1) * 0.18;

  for (let i = 0; i < 20; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - Math.round(daysAgo));
    const dateStr = d.toISOString().slice(0, 10);
    sessions.push({ date: dateStr, score: Math.round(score), rate: Math.round(rate * 100) / 100 });

    const scoreDelta = (seededRand(seed ^ (i * 31337), i + 100) - 0.5) * 14;
    score = Math.min(92, Math.max(58, score + scoreDelta));
    const rateDelta = (seededRand(seed ^ (i * 19867), i + 200) - 0.5) * 0.12;
    rate = Math.min(0.85, Math.max(0.38, rate + rateDelta));

    // Go further back: 5-10 days per step
    daysAgo += 5 + Math.round(seededRand(seed, i * 5 + 4) * 5);
  }

  sessions.sort((a, b) => a.date.localeCompare(b.date));
  const overallScores = sessions.map(({ date, score }) => ({ date, score }));
  const niceRates     = sessions.map(({ date, rate })  => ({ date, rate }));

  const altoClubs = ['7I', '8I', 'AW', 'ドライバー', '9I', 'SW', 'UT'];
  const hotClubName = altoClubs[Math.floor(seededRand(seed, 999) * altoClubs.length)];
  const hotClubRate = 0.55 + seededRand(seed, 998) * 0.28;
  const hotClub = { club: hotClubName, rate: Math.round(hotClubRate * 100) / 100 };

  return { overallScores, niceRates, hotClub };
}

// Build the public summary from local sessions data
function buildPublicSummary(sessions) {
  const overallScores = [...sessions]
    .sort((a, b) => a.date.localeCompare(b.date))
    .map((s) => ({ date: s.date, score: s.overallScore }));

  const niceRates = [...sessions]
    .sort((a, b) => a.date.localeCompare(b.date))
    .map((s) => {
      const tots = emptyCounts();
      Object.values(s.clubs).forEach((c) => {
        RESULT_TYPES.forEach((t) => { tots[t.key] += c[t.key] || 0; });
      });
      const total = totalCount(tots);
      return { date: s.date, rate: total > 0 ? tots.nice / total : null };
    })
    .filter((r) => r.rate !== null);

  // Hot One: best nice-rate club from the 3 most recent sessions
  const hotClub = (() => {
    const recent = [...sessions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 3);
    const map = {};
    recent.forEach((s) => {
      Object.entries(s.clubs).forEach(([club, c]) => {
        if (!map[club]) map[club] = { nice: 0, total: 0 };
        map[club].nice += c.nice || 0;
        map[club].total += totalCount(c);
      });
    });
    const rates = Object.entries(map)
      .filter(([, v]) => v.total >= 3)
      .map(([club, v]) => ({ club, rate: v.nice / v.total }))
      .sort((a, b) => b.rate - a.rate);
    return rates.length > 0 ? { club: rates[0].club, rate: rates[0].rate } : null;
  })();

  return { overallScores, niceRates, hotClub };
}

const RESULT_LABELS = { nice: 'ナイス', slice: 'スライス', hook: 'フック', top: 'トップ', fat: 'ダフリ', shank: 'シャンク' };
const MISS_KEYS = ['slice', 'hook', 'top', 'fat', 'shank'];

// Aggregate counts for a club across all sessions (optionally limited to the most recent N)
function aggregateClubCounts(sessions, club, limit) {
  const list = limit ? sessions.slice(-limit) : sessions;
  const totals = emptyCounts();
  list.forEach((s) => {
    const c = s.clubs[club];
    if (!c) return;
    RESULT_TYPES.forEach((t) => { totals[t.key] += c[t.key] || 0; });
  });
  return totals;
}

// Find the dominant miss type from a counts object; returns null if no misses
function dominantMiss(counts) {
  let best = null;
  MISS_KEYS.forEach((k) => {
    if (counts[k] > 0 && (!best || counts[k] > counts[best])) best = k;
  });
  return best;
}

// Builds a { clubName: counts } map aggregating shot results across all
// sessions, for the tendency visualizations (direction cards + heatmap).
function aggregateAllClubs(sessions) {
  const map = {};
  sessions.forEach((s) => {
    Object.entries(s.clubs).forEach(([club, c]) => {
      if (!map[club]) map[club] = emptyCounts();
      RESULT_TYPES.forEach((t) => { map[club][t.key] += c[t.key] || 0; });
    });
  });
  return map;
}

// Period filter: returns sessions matching the given period key.
// 'all' | 'thisMonth' | 'lastMonth' | 'twoMonthsAgo' | 'older'
function filterSessionsByPeriod(sessions, period) {
  if (period === 'all') return sessions;
  const now = new Date();
  const thisYear = now.getFullYear();
  const thisMonth = now.getMonth(); // 0-indexed
  return sessions.filter((s) => {
    const d = new Date(s.date);
    const y = d.getFullYear(), m = d.getMonth();
    const monthDiff = (thisYear - y) * 12 + (thisMonth - m);
    if (period === 'thisMonth') return monthDiff === 0;
    if (period === 'lastMonth') return monthDiff === 1;
    if (period === 'twoMonthsAgo') return monthDiff === 2;
    if (period === 'older') return monthDiff >= 3;
    return true;
  });
}

const PERIOD_LABELS = {
  all: '全体',
  thisMonth: '今月',
  lastMonth: '先月',
  twoMonthsAgo: '先々月',
  older: 'それ以前',
};
const PERIOD_KEYS = ['all', 'thisMonth', 'lastMonth', 'twoMonthsAgo', 'older'];

// Compute nice rate per club across given sessions (only clubs with >= minShots)
function computeClubNiceRates(sessions, minShots = 3) {
  const map = {};
  sessions.forEach((s) => {
    Object.entries(s.clubs).forEach(([club, c]) => {
      if (!map[club]) map[club] = { nice: 0, total: 0 };
      const total = totalCount(c);
      map[club].nice += c.nice || 0;
      map[club].total += total;
    });
  });
  return Object.entries(map)
    .filter(([, v]) => v.total >= minShots)
    .map(([club, v]) => ({ club, rate: v.total > 0 ? v.nice / v.total : 0, nice: v.nice, total: v.total }))
    .sort((a, b) => b.rate - a.rate);
}

// Compute nice rate per distance across given sessions
function computeDistNiceRates(sessions, minShots = 2) {
  const map = {};
  sessions.forEach((s) => {
    Object.entries(s.distances || {}).forEach(([dist, c]) => {
      if (!map[dist]) map[dist] = { nice: 0, total: 0 };
      map[dist].nice += c.nice || 0;
      map[dist].total += totalDistCount(c);
    });
  });
  return Object.entries(map)
    .filter(([, v]) => v.total >= minShots)
    .sort((a, b) => Number(a[0]) - Number(b[0]))
    .map(([dist, v]) => ({ dist, rate: v.total > 0 ? v.nice / v.total : 0, nice: v.nice, total: v.total }));
}

// Maps each miss type to a 2D direction vector for the arrow visualization,
// reflecting where that miss tends to send the ball: slice/shank drift
// right, hook drifts left, top is a shallow low flight, fat comes up short.
const MISS_DIRECTIONS = {
  slice: { x: 0.85, y: -0.35 },
  hook: { x: -0.85, y: -0.35 },
  shank: { x: 1, y: 0.1 },
  top: { x: 0.15, y: 0.75 },
  fat: { x: -0.1, y: 0.6 },
};

// Computes a single resultant direction vector for a club's miss tendency,
// weighted by how often each miss type occurred, plus a 0-1 "severity"
// representing how miss-prone the club is overall (share of non-nice shots).
function computeClubTendency(counts) {
  const total = totalCount(counts);
  if (total === 0) return null;
  let vx = 0, vy = 0;
  MISS_KEYS.forEach((k) => {
    const n = counts[k] || 0;
    if (n === 0) return;
    vx += MISS_DIRECTIONS[k].x * n;
    vy += MISS_DIRECTIONS[k].y * n;
  });
  const missTotal = MISS_KEYS.reduce((s, k) => s + (counts[k] || 0), 0);
  const mag = Math.sqrt(vx * vx + vy * vy);
  const norm = mag > 0 ? { x: vx / mag, y: vy / mag } : { x: 0, y: 0 };
  const severity = missTotal / total; // 0 = all nice, 1 = no nice shots at all
  const topMissKey = dominantMiss(counts);
  return { x: norm.x, y: norm.y, severity, missShare: missTotal / total, topMiss: topMissKey, total };
}

// Alto's analysis on the home screen: leads with overall trend (score
// direction, nice-shot rate, dominant miss pattern across all clubs) and
// only calls out a specific club when one tendency clearly stands out.
function getHomeAltoState(sessions) {
  if (sessions.length === 0) {
    return { mood: 'okay', message: 'Altoだ。記録をつけないと上手くならないぞ。さっさと始めろ。' };
  }
  if (sessions.length === 1) {
    return { mood: 'okay', message: '1回記録しただけで満足してないよな？続けないと意味ないぞ。' };
  }

  const last = sessions[sessions.length - 1];
  const prev = sessions[sessions.length - 2];
  const diff = last.overallScore - prev.overallScore;

  const recent = sessions.slice(-5);
  const overallTotals = emptyCounts();
  const clubTotals = {};
  recent.forEach((s) => {
    Object.entries(s.clubs).forEach(([club, c]) => {
      if (!clubTotals[club]) clubTotals[club] = emptyCounts();
      RESULT_TYPES.forEach((t) => {
        clubTotals[club][t.key] += c[t.key] || 0;
        overallTotals[t.key] += c[t.key] || 0;
      });
    });
  });

  const totalShots = totalCount(overallTotals);
  const niceRate = totalShots > 0 ? overallTotals.nice / totalShots : 0;
  const topMiss = dominantMiss(overallTotals);
  const topMissCount = topMiss ? overallTotals[topMiss] : 0;
  const topMissShare = totalShots > 0 ? topMissCount / totalShots : 0;

  const clubScores = Object.entries(clubTotals)
    .map(([club, counts]) => [club, totalCount(counts), computeClubScore(counts)])
    .filter(([, total]) => total >= 5);
  let outlierClub = null, outlierScore = 101;
  if (clubScores.length >= 2) {
    const avgOfRest = (excludeClub) => {
      const others = clubScores.filter(([c]) => c !== excludeClub);
      return others.reduce((sum, [, , s]) => sum + s, 0) / others.length;
    };
    clubScores.forEach(([club, , score]) => {
      const rest = avgOfRest(club);
      if (score < rest - 18 && score < outlierScore) { outlierScore = score; outlierClub = club; }
    });
  }

  // Seed for pseudo-random message rotation (changes daily)
  const daySeed = Math.floor(Date.now() / 86400000) + sessions.length;
  const pick = (arr) => arr[daySeed % arr.length];

  if (diff > 0.5) {
    if (niceRate >= 0.6) {
      return { mood: 'happy', message: pick([
        '...スコア上がってるじゃないか。まあ、当然だけどな。次も同じようにやれ。',
        'ナイス率も高いし今日は及第点だ。でもラウンドで同じようにできると思うなよ。コースには風も傾斜もある。',
        '練習で上手くいったからってラウンドで上手くいくとは思うなよ？でも今日は悪くなかった。',
        'スコアが上がった。褒めてほしいか？オレは褒めない。でも記録には残した。',
      ]) };
    }
    return { mood: 'happy', message: pick([
      '前回よりマシになってる。褒めるほどじゃないが、まあ続けろ。',
      'スコアは上がった。でも練習場と本番は別物だ。それだけは忘れるな。',
      'まあ悪くはない方向に向かってる。このまま続けろ。サボったら振り出しに戻るぞ。',
    ]) };
  }

  if (diff < -0.5) {
    if (topMiss && topMissShare >= 0.3) {
      return { mood: 'encourage', message: pick([
        `スコア落ちてるぞ。${RESULT_LABELS[topMiss]}を量産してたのはオレが見てた。言い訳は聞かない。`,
        `${RESULT_LABELS[topMiss]}が増えてる。気づいてたか？気づいてなかったなら今気づけ。`,
        `前回より${RESULT_LABELS[topMiss]}が増えた。体がおかしいのか、メンタルか、どっちだ。`,
      ]) };
    }
    return { mood: 'encourage', message: pick([
      'スコアが落ちた。原因が分からないなら、もっと記録しろ。データは嘘をつかない。お前がつくんだ。',
      'スランプか？ゴルフあるあるだ。でもオレに言わせれば練習量が足りないだけだ。',
      '調子が落ちてるな。フォームをいじりすぎてないか？ゴルファーの9割はそれで沼にはまる。',
    ]) };
  }

  if (outlierClub) {
    return { mood: 'okay', message: pick([
      `${outlierClub}だけ明らかに弱い。分かってるか？分かってて直さないなら、オレにはもう何も言えない。`,
      `${outlierClub}が足を引っ張ってる。コースでそのクラブが必要な場面を想像してみろ。震えるだろ。`,
      `${outlierClub}、直す気あるか？あるなら次の練習で最初に打て。ないなら正直に言え。`,
    ]) };

  if (topMiss && topMissShare >= 0.35) {
    return { mood: 'okay', message: pick([
      `${RESULT_LABELS[topMiss]}、何回出てるか数えたか？オレは数えてた。次の練習でそこを直さないなら記録つける意味ないぞ。`,

function getResultAltoState(session) {
  const clubEntries = Object.entries(session.clubs);
  const distEntries = Object.entries(session.distances || {});
  const hasClubs = clubEntries.length > 0;
  const hasDists = distEntries.length > 0;

  const clubOverall = hasClubs
    ? clubEntries.reduce((sum, [, c]) => sum + c.score, 0) / clubEntries.length
    : null;
  const distOverall = hasDists
    ? distEntries.reduce((sum, [, c]) => sum + c.score, 0) / distEntries.length
    : null;
  const overall = clubOverall !== null ? clubOverall : (distOverall || 0);

  const sessionTotals = emptyCounts();
  clubEntries.forEach(([, c]) => { RESULT_TYPES.forEach((t) => { sessionTotals[t.key] += c[t.key] || 0; }); });
  const totalShots = totalCount(sessionTotals);
  const niceRate = totalShots > 0 ? sessionTotals.nice / totalShots : 0;
  const topMiss = dominantMiss(sessionTotals);
  const topMissShare = topMiss && totalShots > 0 ? sessionTotals[topMiss] / totalShots : 0;

  const distTotals = emptyDistCounts();
  distEntries.forEach(([, c]) => { DIST_RESULT_TYPES.forEach((t) => { distTotals[t.key] += c[t.key] || 0; }); });
  const distTotal = totalDistCount(distTotals);
  const distNiceRate = distTotal > 0 ? distTotals.nice / distTotal : 0;
  const topDistMiss = DIST_MISS_KEYS.reduce((best, k) => {
    return (!best || distTotals[k] > distTotals[best]) ? k : best;
  }, null);

  let bestClub = null, bestScore = -1, weakClub = null, weakScore = 101;
  clubEntries.forEach(([club, c]) => {
    if (c.score > bestScore) { bestScore = c.score; bestClub = club; }
    if (c.score < weakScore) { weakScore = c.score; weakClub = club; }
  });

  let bestDist = null, bestDistScore = -1;
  distEntries.forEach(([dist, c]) => {
    if (c.score > bestDistScore) { bestDistScore = c.score; bestDist = dist; }
  });

  const timeSeed = Math.floor(Date.now() / 1000);
  const pick = (arr) => arr[timeSeed % arr.length];

  // ---- HAPPY (80+) ----
  if (overall >= 80) {
    return { mood: 'happy', message: pick([
      bestClub && bestScore >= 90
        ? `${bestClub}はまともに打ててた。認めてやる。ただし次も同じクオリティを出せなかったら知らないぞ。`
        : `ナイス率${Math.round(niceRate * 100)}%か。...悪くない。次はもっとやれ。`,
      '今日は良かった。でも練習場で打てたからってラウンドで同じように打てると思うなよ。同伴者の目線、OBの恐怖、全部別物だ。',
      hasDists && bestDist
        ? `${bestDist}yは思ったより打ててたじゃないか。たまにはやるな。`
        : '今日は及第点だ。浮かれるな。明日の練習もある。',
      'まあ今日は良かった。でもこれが続くかどうかが本物かどうかの分かれ目だ。来週も同じスコアを出せ。',
      `ナイス率${Math.round(niceRate * 100)}%。練習場のベストスコアなんてラウンドじゃ何の意味もないが、まあ記録しておいてやる。`,
    ]) };
  }

  // ---- OKAY (60-79) ----
  if (overall >= 60) {
    if (hasDists && distNiceRate < 0.4 && topDistMiss) {
      return { mood: 'okay', message: pick([
        `クラブはギリギリ合格点だ。でも距離感の練習、${DIST_RESULT_LABELS[topDistMiss]}連発してたのは見てたぞ。そこ直さないと試合でボロが出る。`,
        `アプローチの${DIST_RESULT_LABELS[topDistMiss]}はスコアを直接壊す。パー5を3オンしてから3パットするゴルファーを何人見てきたか。`,
      ]) };
    }
    if (topMiss && topMissShare >= 0.25 && weakClub) {
      return { mood: 'okay', message: pick([
        `${weakClub}の${RESULT_LABELS[topMiss]}、何回出した？数えたくなかっただろうがオレは数えてる。次までに直せ。`,
        `${weakClub}が今日の足を引っ張った。コースでその番手が必要なホールを想像したか？ぞっとするだろ。`,
        `${RESULT_LABELS[topMiss]}が出るときの共通点を考えたことあるか？力みか、グリップか、何かある。`,
      ]) };
    }
    if (niceRate >= 0.5) {
      return { mood: 'okay', message: pick([
        '半分以上はナイスだ。残り半分は何なんだ。その残りを減らすのが練習だろ。',
        'ナイスが半分以上出てる。でも残りのミスがコースだったら何打叩くか分かるか？計算してみろ。',
        '悪くはない。でもラウンドは練習と違って同じ球を2回打てない。一発で決める練習をしてるか？',
      ]) };
    }
    return { mood: 'okay', message: pick([
      'まあ、練習したんだから記録にはなった。上手くなったかどうかは別の話だ。',
      '平均的な練習だった。平均的なゴルファーで満足か？',
      'ミスもあったがナイスもあった。コースではミスの方が記憶に残るぞ。次はミスを減らせ。',
      '中途半端な練習が一番危険だ。中途半端に上手くなった気になってコースで崩れるパターンが見えるぞ。',
    ]) };
  }

  // ---- ROUGH (<60) ----
  if (hasDists && distTotal > 0 && distNiceRate >= 0.4) {
    return { mood: 'encourage', message: pick([
      'クラブは今日はひどかった。距離感だけはマシだったが、それで満足してたら困る。全部できて初めて意味がある。',
      'アプローチだけ良くてもスコアにはならない。クラブが崩れてたらグリーンにすら乗れないぞ。',
    ]) };
  }
  if (topMiss === 'shank') {
    return { mood: 'encourage', message: pick([
      'シャンク。今日の記録に刻まれた。消せない。次は消えるように練習しろ。',
      'シャンクは誰でも出る。プロでさえ出る。でも頻繁に出てるなら話は別だ。グリップかアドレスを疑え。',
      'シャンクが出たな。一番やっかいなミスだ。でもオレが見てる限り、次の球を怖がって打ったやつのシャンクはさらに増える。開き直れ。',
    ]) };
  }
  if (topMiss === 'slice') {
    return { mood: 'encourage', message: pick([
      `スライスが${Math.round(topMissShare * 100)}%か。もはや持ち球と呼んでいいレベルだな。でも誰も羨ましがらないぞ。`,
      'スライスが多い。グリップが弱いか、アウトサイドインか、フェースが開いてるかだ。全部か。',
      'スライスはゴルフ界で最も量産されるミスだ。でも量産していいとは言ってない。',
    ]) };
  }
  if (topMiss === 'fat') {
    return { mood: 'encourage', message: pick([
      'ダフリが多い。軸がブレてるか、ボール位置が前すぎるか。どっちにしてもアマチュアあるあるだ。',
      `ダフリ${Math.round(topMissShare * 100)}%。コースの芝でそれをやったら跳ねてOBが出る。想像しただけで怖いな。`,
    ]) };
  }
  if (topMiss && topMissShare >= 0.35) {
    return { mood: 'encourage', message: pick([
      `${RESULT_LABELS[topMiss]}が${Math.round(topMissShare * 100)}%か。もはや得意技だな。でも誰も褒めないぞ。次までに半分にしろ。`,
      `${RESULT_LABELS[topMiss]}が癖になってる。癖は直さないと一生付き合うことになるぞ。`,
      `今日の${RESULT_LABELS[topMiss]}の数をコースに当てはめてみろ。OBか池か林か。どれも最悪だ。`,
    ]) };
  }
  return { mood: 'encourage', message: pick([
    'スコアが低い。理由は分かってるか？分からないなら分析タブを見ろ。オレが全部記録してある。',
    '今日はひどかった。でも記録した。記録しなかったらただひどかっただけで終わる。',
    'ゴルフはメンタルスポーツだとか言い訳するなよ。技術が上がればメンタルも安定する。技術を上げろ。',
    '打ちっぱなしで崩れるなら本番はもっとひどい。でも練習で崩れる方が修正しやすい。今気づいてよかったと思え。',
  ]) };
}

        <p style={{ margin: '2px 0 0', fontSize: 11, color: COLORS.mutedDark }}>ナイス率</p>
      </div>
    </div>
  );
}

// Self-contained SVG area chart — replaces the recharts dependency so the
// standalone build has no external chart library to fail to load.
// data: [{ label, score }], height in px. Renders with a responsive width
// via a viewBox + percentage-width SVG, plus a tap/hover tooltip.
// Inline nice-rate bar: label, bar, percentage
function NiceRateBar({ label, rate, subLabel }) {
  const pct = Math.round(rate * 100);
  const color = pct >= 70 ? COLORS.fairway : pct >= 50 ? COLORS.scoreMid : COLORS.miss;
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
        <span style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>{label}</span>
        <span style={{ fontSize: 13, fontWeight: 700, color }}>{pct}%</span>
      </div>
      <div style={{ height: 8, background: COLORS.bg, borderRadius: 999, overflow: 'hidden' }}>
        <div style={{ height: '100%', width: `${pct}%`, background: color, borderRadius: 999, transition: 'width 0.4s ease' }} />
      </div>
      {subLabel && <p style={{ fontSize: 11, color: COLORS.mutedDark, margin: '3px 0 0' }}>{subLabel}</p>}
    </div>
  );
}

function ScoreAreaChart({ data, height = 190 }) {
  const [activeIndex, setActiveIndex] = useState(null);
  if (!data || data.length === 0) return null;

  const W = 320; // virtual coordinate width; SVG scales to container via viewBox
  const H = height;
  const padL = 28, padR = 8, padT = 10, padB = 22;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const n = data.length;
  const xFor = (i) => (n === 1 ? padL + plotW / 2 : padL + (i / (n - 1)) * plotW);
  const yFor = (score) => padT + plotH - (Math.max(0, Math.min(100, score)) / 100) * plotH;

  const linePoints = data.map((d, i) => `${xFor(i)},${yFor(d.score)}`).join(' ');
  const areaPoints = `${xFor(0)},${padT + plotH} ${linePoints} ${xFor(n - 1)},${padT + plotH}`;

  const gridValues = [0, 25, 50, 75, 100];

  const handleMove = (clientX, currentTarget) => {
    const rect = currentTarget.getBoundingClientRect();
    const relX = ((clientX - rect.left) / rect.width) * W;
    let closest = 0, closestDist = Infinity;
    data.forEach((d, i) => {
      const dist = Math.abs(xFor(i) - relX);
      if (dist < closestDist) { closestDist = dist; closest = i; }
    });
    setActiveIndex(closest);
  };

  const active = activeIndex !== null ? data[activeIndex] : null;
  const tooltipX = active ? xFor(activeIndex) : 0;
  const tooltipLeftPct = active ? (tooltipX / W) * 100 : 0;

  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <svg
        width="100%"
        height={H}
        viewBox={`0 0 ${W} ${H}`}
        preserveAspectRatio="none"
        onMouseMove={(e) => handleMove(e.clientX, e.currentTarget)}
        onMouseLeave={() => setActiveIndex(null)}
        onTouchStart={(e) => handleMove(e.touches[0].clientX, e.currentTarget)}
        onTouchMove={(e) => handleMove(e.touches[0].clientX, e.currentTarget)}
        onTouchEnd={() => setActiveIndex(null)}
        style={{ display: 'block', touchAction: 'pan-y' }}
      >
        <defs>
          <linearGradient id="fairwayFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS.fairway} stopOpacity="0.22" />
            <stop offset="100%" stopColor={COLORS.fairway} stopOpacity="0" />
          </linearGradient>
        </defs>

        {gridValues.map((v) => (
          <line
            key={v}
            x1={padL} x2={W - padR}
            y1={yFor(v)} y2={yFor(v)}
            stroke={COLORS.border}
            strokeWidth="1"
          />
        ))}

        {gridValues.map((v) => (
          <text key={v} x={padL - 6} y={yFor(v) + 3} fontSize="9" fill={COLORS.mutedDark} textAnchor="end">{v}</text>
        ))}

        {data.map((d, i) => {
          // Show at most 5 labels: always show first and last, thin out the rest
          const maxLabels = 5;
          const step = Math.ceil(n / (maxLabels - 1));
          const show = i === 0 || i === n - 1 || i % step === 0;
          if (!show) return null;
          return <text key={i} x={xFor(i)} y={H - 6} fontSize="9" fill={COLORS.mutedDark} textAnchor="middle">{d.label}</text>;
        })}

        <polygon points={areaPoints} fill="url(#fairwayFill)" />
        <polyline points={linePoints} fill="none" stroke={COLORS.fairway} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />

        {data.map((d, i) => (
          <circle
            key={i}
            cx={xFor(i)} cy={yFor(d.score)}
            r={activeIndex === i ? 4.5 : 3}
            fill={COLORS.fairway}
            stroke="#fff"
            strokeWidth={activeIndex === i ? 1.5 : 0}
          />
        ))}

        {active && (
          <line x1={tooltipX} x2={tooltipX} y1={padT} y2={padT + plotH} stroke={COLORS.fairway} strokeWidth="1" strokeDasharray="3 3" opacity="0.4" />
        )}
      </svg>

      {active && (
        <div
          style={{
            position: 'absolute',
            top: 0,
            left: `${tooltipLeftPct}%`,
            transform: `translateX(${tooltipLeftPct > 80 ? '-100%' : tooltipLeftPct < 20 ? '0%' : '-50%'})`,
            background: '#fff',
            borderRadius: 10,
            padding: '6px 10px',
            fontSize: 12,
            fontWeight: 600,
            color: COLORS.text,
            boxShadow: '0 2px 8px rgba(0,0,0,0.12)',
            pointerEvents: 'none',
            whiteSpace: 'nowrap',
          }}
        >
          {active.label} ・ {active.score}点
        </div>
      )}
    </div>
  );
}

// Compass-style tendency cards: one per club, showing a ball icon with an
// arrow pointing in the resultant direction of that club's misses. Arrow
// length/opacity reflects how miss-prone the club is (severity), so a
// short faint arrow means mostly nice shots, a long bold one means a
// strong, consistent miss tendency.
function ClubTendencyArrows({ clubCounts }) {
  const entries = Object.entries(clubCounts)
    .map(([club, counts]) => [club, computeClubTendency(counts)])
    .filter(([, t]) => t && t.total >= 3)
    .sort((a, b) => b[1].severity - a[1].severity);

  if (entries.length === 0) return null;

  const size = 76;
  const center = size / 2;
  const maxLen = size * 0.36;

  return (
    <div style={{ display: 'flex', gap: 12, overflowX: 'auto', padding: '2px 2px 6px' }}>
      {entries.map(([club, t]) => {
        const len = 6 + t.severity * maxLen;
        const tipX = center + t.x * len;
        const tipY = center + t.y * len;
        const hasDirection = t.x !== 0 || t.y !== 0;
        const arrowColor = t.severity > 0.45 ? COLORS.miss : t.severity > 0.2 ? COLORS.scoreMid : COLORS.fairway;

        return (
          <div key={club} style={{ flexShrink: 0, width: size, textAlign: 'center' }}>
            <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
              {[0.18, 0.30].map((r) => (
                <circle key={r} cx={center} cy={center} r={size * r} fill="none" stroke={COLORS.border} strokeWidth="1" />
              ))}
              <circle cx={center} cy={center} r={4.5} fill={COLORS.muted} />
              {hasDirection && (
                <>
                  <defs>
                    <marker id={`arrowhead-${club}`} markerWidth="6" markerHeight="6" refX="4" refY="3" orient="auto">
                      <path d="M0,0 L6,3 L0,6 Z" fill={arrowColor} />
                    </marker>
                  </defs>
                  <line
                    x1={center} y1={center} x2={tipX} y2={tipY}
                    stroke={arrowColor} strokeWidth={2.5} strokeLinecap="round"
                    markerEnd={`url(#arrowhead-${club})`}
                  />
                </>
              )}
            </svg>
            <p style={{ margin: '2px 0 0', fontSize: 12, fontWeight: 700, color: COLORS.text }}>{club}</p>
            <p style={{ margin: 0, fontSize: 10.5, color: COLORS.mutedDark }}>
              {t.topMiss ? RESULT_LABELS[t.topMiss] + '傾向' : '安定'}
            </p>
          </div>
        );
      })}
    </div>
  );
}

// Club x miss-type heatmap: rows are clubs, columns are miss types, cell
// shade reflects how often that combination occurred (relative to that
// club's own shot count), so patterns ("this club always slices") pop out
// at a glance across the whole bag.
function ClubTendencyHeatmap({ clubCounts }) {
  const entries = Object.entries(clubCounts)
    .map(([club, counts]) => [club, counts, totalCount(counts)])
    .filter(([, , total]) => total >= 3)
    .sort((a, b) => b[2] - a[2]);

  if (entries.length === 0) return null;

  return (
    <div style={{ overflowX: 'auto' }}>
      <table style={{ borderCollapse: 'collapse', width: '100%', minWidth: 360 }}>
        <thead>
          <tr>
            <th style={{ textAlign: 'left', fontSize: 11, fontWeight: 600, color: COLORS.mutedDark, padding: '0 6px 6px 0' }}></th>
            {MISS_KEYS.map((k) => (
              <th key={k} style={{ fontSize: 10.5, fontWeight: 600, color: COLORS.mutedDark, padding: '0 4px 6px', textAlign: 'center' }}>
                {RESULT_LABELS[k]}
              </th>
            ))}
          </tr>
        </thead>
        <tbody>
          {entries.map(([club, counts, total]) => (
            <tr key={club}>
              <td style={{ fontSize: 12, fontWeight: 700, color: COLORS.text, padding: '4px 6px 4px 0', whiteSpace: 'nowrap' }}>{club}</td>
              {MISS_KEYS.map((k) => {
                const n = counts[k] || 0;
                const share = total > 0 ? n / total : 0;
                const bg = share === 0
                  ? COLORS.bg
                  : `rgba(217, 83, 79, ${0.12 + share * 0.75})`;
                const textColor = share > 0.45 ? '#fff' : COLORS.mutedDark;
                return (
                  <td key={k} style={{ padding: 2, textAlign: 'center' }}>
                    <div style={{ background: bg, borderRadius: 8, padding: '6px 2px', fontSize: 11, fontWeight: 700, color: textColor }}>
                      {n > 0 ? n : ''}
                    </div>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// Distance tendency visualization: a top-down "landing zone" view per
// distance, showing where shots tend to land (nice = center green,
// short = below, over = above, left/right = sides, contact = scattered).
// Each distance gets its own mini circle map. The dot density + color
// give an immediate read of how many shots and how well-controlled.
const DIST_DOT_POSITIONS = {
  nice:    { x: 0,     y: 0    },
  short:   { x: 0,     y: 0.62 },
  over:    { x: 0,     y: -0.62},
  left:    { x: -0.62, y: 0    },
  right:   { x: 0.62,  y: 0    },
  contact: { x: 0,     y: 0.35 },
};
const DIST_DOT_COLORS = {
  nice: '#2E7D55', short: '#E8A93B', over: '#5B7A8C',
  left: '#A8503A', right: '#9C4A8A', contact: '#D9534F',
};

function DistanceTendencyMap({ distCounts, sessions = [] }) {
  const [activeDist, setActiveDist] = useState(null);
  const [activeTab, setActiveTab] = useState('all'); // 'all' | 'timeline'

  const entries = Object.entries(distCounts)
    .sort((a, b) => Number(a[0]) - Number(b[0]))
    .filter(([, c]) => totalDistCount(c) >= 2);

  if (entries.length === 0) return null;

  const R = 38, CX = 50, CY = 50, SIZE = 100, DOT_R = 5;

  function buildDots(counts, seed0 = 1) {
    const dots = [];
    let seed = seed0;
    function jitter() { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return ((seed >>> 0) / 0xffffffff - 0.5) * 0.22; }
    DIST_RESULT_TYPES.forEach((rt) => {
      const n = counts[rt.key] || 0;
      if (n === 0) return;
      const pos = DIST_DOT_POSITIONS[rt.key];
      for (let i = 0; i < n; i++) {
        const spread = n === 1 ? 0 : (i / (n - 1) - 0.5) * 0.28 + jitter();
        dots.push({
          x: CX + (pos.x + spread) * R,
          y: CY + (pos.y + (n === 1 ? 0 : jitter() * 0.15)) * R,
          color: DIST_DOT_COLORS[rt.key],
        });
      }
    });
    return dots;
  }

  // Per-session data for the active distance, sorted oldest→newest
  const sessionHistory = useMemo(() => {
    if (activeDist === null) return [];
    const dkey = String(activeDist);
    return sessions
      .filter((s) => s.distances && s.distances[dkey] && totalDistCount(s.distances[dkey]) >= 1)
      .sort((a, b) => a.date.localeCompare(b.date))
      .map((s) => ({
        date: s.date,
        label: formatDateShort(s.date),
        counts: s.distances[dkey],
        score: s.distances[dkey].score ?? computeDistScore(s.distances[dkey]),
      }));
  }, [activeDist, sessions]);

  const active = activeDist !== null ? entries.find(([d]) => d === String(activeDist)) : null;
  const activeCounts = active ? active[1] : null;

  // Mini green SVG (shared between grid and timeline views)
  function MiniGreen({ counts, size = SIZE, seed = 1, showLabels = false }) {
    const dots = buildDots(counts, seed);
    const rScale = (size / SIZE);
    const r = R * rScale, cx = size / 2, cy = size / 2;
    const dr = DOT_R * rScale * 0.85;
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={cx} cy={cy} r={r + 8 * rScale} fill="#C8E6C0" />
        <circle cx={cx} cy={cy} r={r} fill="#A5D6A7" />
        <circle cx={cx} cy={cy} r={r * 0.42} fill="#66BB6A" />
        <line x1={cx} y1={cy - r * 0.42} x2={cx} y2={cy - r * 0.8} stroke="#555" strokeWidth={1.2 * rScale} />
        <polygon points={`${cx},${cy - r * 0.8} ${cx + 7 * rScale},${cy - r * 0.68} ${cx},${cy - r * 0.58}`} fill="#D9534F" />
        <line x1={cx - r * 0.3} y1={cy} x2={cx + r * 0.3} y2={cy} stroke="rgba(0,0,0,0.12)" strokeWidth={0.8 * rScale} />
        <line x1={cx} y1={cy - r * 0.3} x2={cx} y2={cy + r * 0.3} stroke="rgba(0,0,0,0.12)" strokeWidth={0.8 * rScale} />
        {showLabels && (
          <>
            <text x={cx} y={cy - r - 2} textAnchor="middle" fontSize={7 * rScale} fill="#666">オーバー</text>
            <text x={cx} y={cy + r + 9 * rScale} textAnchor="middle" fontSize={7 * rScale} fill="#666">ショート</text>
            <text x={cx - r - 1} y={cy + 3 * rScale} textAnchor="end" fontSize={7 * rScale} fill="#666">左</text>
            <text x={cx + r + 1} y={cy + 3 * rScale} textAnchor="start" fontSize={7 * rScale} fill="#666">右</text>
          </>
        )}
        {dots.map((d, i) => (
          <circle key={i}
            cx={cx + (d.x - CX) * rScale}
            cy={cy + (d.y - CY) * rScale}
            r={dr} fill={d.color} opacity="0.88"
          />
        ))}
      </svg>
    );
  }

  // Score sparkline for timeline tab
  function TimelineScoreLine({ history }) {
    if (history.length < 2) return null;
    const W = 280, H = 48, padL = 4, padR = 4, padT = 6, padB = 6;
    const scores = history.map((h) => h.score);
    const minS = Math.min(...scores, 40), maxS = Math.max(...scores, 80);
    const xFor = (i) => padL + (i / (history.length - 1)) * (W - padL - padR);
    const yFor = (s) => padT + (H - padT - padB) * (1 - (s - minS) / Math.max(1, maxS - minS));
    const line = history.map((h, i) => `${xFor(i)},${yFor(h.score)}`).join(' ');
    const area = `${xFor(0)},${H - padB} ${line} ${xFor(history.length - 1)},${H - padB}`;
    return (
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id="timelineFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS.fairway} stopOpacity="0.2" />
            <stop offset="100%" stopColor={COLORS.fairway} stopOpacity="0" />
          </linearGradient>
        </defs>
        <polygon points={area} fill="url(#timelineFill)" />
        <polyline points={line} fill="none" stroke={COLORS.fairway} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
        {history.map((h, i) => (
          <circle key={i} cx={xFor(i)} cy={yFor(h.score)} r="3.5" fill={scoreColor(h.score)} stroke="#fff" strokeWidth="1" />
        ))}
      </svg>
    );
  }

  return (
    <div>
      {/* Distance chips */}
      <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 12 }}>
        {entries.map(([dist, counts]) => {
          const score = counts.score ?? computeDistScore(counts);
          const isActive = String(activeDist) === dist;
          return (
            <button key={dist}
              onClick={() => { setActiveDist(isActive ? null : Number(dist)); setActiveTab('all'); }}
              style={{
                flexShrink: 0, border: 'none', borderRadius: 999,
                padding: '7px 14px', fontFamily: FONT_STACK,
                fontSize: 13, fontWeight: 700, cursor: 'pointer',
                background: isActive ? COLORS.fairway : COLORS.bg,
                color: isActive ? '#fff' : COLORS.text,
              }}
            >
              {dist}y
              {score !== null && (
                <span style={{ marginLeft: 4, fontSize: 11, fontWeight: 600, color: isActive ? 'rgba(255,255,255,0.8)' : scoreColor(score) }}>
                  {roundScore(score)}
                </span>
              )}
            </button>
          );
        })}
      </div>

      {/* Mini grid (no active selection) */}
      {activeDist === null && (
        <div style={{ display: 'flex', gap: 10, overflowX: 'auto', paddingBottom: 4 }}>
          {entries.map(([dist, counts]) => {
            const score = counts.score ?? computeDistScore(counts);
            return (
              <div key={dist} style={{ flexShrink: 0, textAlign: 'center', cursor: 'pointer' }} onClick={() => { setActiveDist(Number(dist)); setActiveTab('all'); }}>
                <MiniGreen counts={counts} size={SIZE} seed={Number(dist)} />
                <p style={{ margin: '4px 0 0', fontSize: 12, fontWeight: 700, color: COLORS.text }}>{dist}y</p>
                {score !== null && <p style={{ margin: '1px 0 0', fontSize: 11, color: scoreColor(score), fontWeight: 600 }}>{roundScore(score)}点</p>}
              </div>
            );
          })}
        </div>
      )}

      {/* Expanded view */}
      {activeDist !== null && activeCounts && (
        <div>
          {/* Tab switcher */}
          <div style={{ display: 'flex', background: COLORS.bg, borderRadius: 12, padding: 3, marginBottom: 16 }}>
            {[{key:'all', label:'全体'}, {key:'timeline', label:'時系列の変化'}].map((tab) => (
              <button key={tab.key} onClick={() => setActiveTab(tab.key)}
                style={{
                  flex: 1, border: 'none', borderRadius: 10, padding: '8px 0',
                  fontSize: 13, fontWeight: 700, cursor: 'pointer', fontFamily: FONT_STACK,
                  background: activeTab === tab.key ? COLORS.card : 'transparent',
                  color: activeTab === tab.key ? COLORS.text : COLORS.mutedDark,
                  boxShadow: activeTab === tab.key ? '0 1px 2px rgba(0,0,0,0.06)' : 'none',
                  transition: 'all 0.15s',
                }}
              >{tab.label}</button>
            ))}
          </div>

          {activeTab === 'all' && (
            <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
              <MiniGreen counts={activeCounts} size={160} seed={activeDist} showLabels />
              <div style={{ flex: 1 }}>
                {DIST_RESULT_TYPES.map((rt) => {
                  const n = activeCounts[rt.key] || 0;
                  if (n === 0) return null;
                  const total = totalDistCount(activeCounts);
                  return (
                    <div key={rt.key} style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 7 }}>
                      <div style={{ width: 10, height: 10, borderRadius: '50%', background: DIST_DOT_COLORS[rt.key], flexShrink: 0 }} />
                      <span style={{ fontSize: 12, color: COLORS.text, flex: 1 }}>{rt.label}</span>
                      <span style={{ fontSize: 12, fontWeight: 700, color: COLORS.mutedDark }}>{n}球</span>
                      <span style={{ fontSize: 11, color: COLORS.mutedDark }}>{Math.round(n / total * 100)}%</span>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {activeTab === 'timeline' && (
            <div>
              {sessionHistory.length < 2 ? (
                <p style={{ fontSize: 13, color: COLORS.mutedDark, textAlign: 'center', padding: '16px 0' }}>
                  時系列を見るには2回以上の記録が必要です
                </p>
              ) : (
                <>
                  {/* Score trend line */}
                  <div style={{ marginBottom: 16 }}>
                    <p style={{ fontSize: 12, color: COLORS.mutedDark, margin: '0 0 6px' }}>スコアの推移</p>
                    <TimelineScoreLine history={sessionHistory} />
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 2 }}>
                      <span style={{ fontSize: 10, color: COLORS.mutedDark }}>{sessionHistory[0].label}</span>
                      <span style={{ fontSize: 10, color: COLORS.mutedDark }}>{sessionHistory[sessionHistory.length - 1].label}</span>
                    </div>
                  </div>

                  {/* Per-session landing maps */}
                  <p style={{ fontSize: 12, color: COLORS.mutedDark, margin: '0 0 10px' }}>セッションごとのランディングゾーン</p>
                  <div style={{ display: 'flex', gap: 12, overflowX: 'auto', paddingBottom: 4 }}>
                    {sessionHistory.map((h, idx) => (
                      <div key={h.date} style={{ flexShrink: 0, textAlign: 'center' }}>
                        {/* Trend arrow between sessions */}
                        {idx > 0 && (() => {
                          const diff = h.score - sessionHistory[idx - 1].score;
                          const arrow = diff > 2 ? '↑' : diff < -2 ? '↓' : '→';
                          const color = diff > 2 ? COLORS.fairway : diff < -2 ? COLORS.miss : COLORS.mutedDark;
                          return null; // arrows shown between items below via label
                        })()}
                        <MiniGreen counts={h.counts} size={80} seed={h.date.charCodeAt(8) * 31 + idx} />
                        <p style={{ margin: '3px 0 0', fontSize: 10.5, fontWeight: 700, color: COLORS.text }}>{h.label}</p>
                        <p style={{ margin: '1px 0 0', fontSize: 11, fontWeight: 700, color: scoreColor(h.score) }}>
                          {roundScore(h.score)}点
                          {idx > 0 && (() => {
                            const diff = h.score - sessionHistory[idx - 1].score;
                            if (Math.abs(diff) < 1) return null;
                            return <span style={{ fontSize: 10, marginLeft: 2, color: diff > 0 ? COLORS.fairway : COLORS.miss }}>{diff > 0 ? `+${Math.round(diff)}` : Math.round(diff)}</span>;
                          })()}
                        </p>
                      </div>
                    ))}
                  </div>

                  {/* Trend summary */}
                  {sessionHistory.length >= 2 && (() => {
                    const first = sessionHistory[0].score;
                    const last = sessionHistory[sessionHistory.length - 1].score;
                    const diff = last - first;
                    const improving = diff > 3;
                    const declining = diff < -3;
                    return (
                      <div style={{ marginTop: 14, padding: '10px 12px', background: improving ? COLORS.accentSoft : declining ? COLORS.missSoft : COLORS.bg, borderRadius: 12 }}>
                        <p style={{ fontSize: 12, margin: 0, color: COLORS.text, lineHeight: 1.6 }}>
                          {improving
                            ? `初回から${Math.round(diff)}点アップ!${activeDist}yの精度が着実に上がってきてる`
                            : declining
                            ? `最近${activeDist}yのスコアが少し落ちてきてる。次の練習でここを重点的に`
                            : `${activeDist}yは安定して練習できてる。このままコツコツ続けよう`}
                        </p>
                      </div>
                    );
                  })()}
                </>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Sparkline({ scores }) {
  if (!scores || scores.length < 2) return null;
  const w = 96, h = 34, pad = 3;
  const points = scores.map((s, i) => {
    const x = pad + (i / (scores.length - 1)) * (w - pad * 2);
    const y = h - pad - (Math.max(0, Math.min(100, s)) / 100) * (h - pad * 2);
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={points} fill="none" stroke={COLORS.fairway} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// Alto — recreated from the original Alto English mascot artwork.
// mood: 'happy' | 'okay' | 'encourage'
function AltoDog({ mood = 'okay', size = 64 }) {
  const h = size * (193 / 180);
  return (
    <div style={{ position: 'relative', width: size, height: h, flexShrink: 0 }}>
      <img src={ALTO_HEAD_BODY_IMG} alt="Alto" style={{ width: '100%', height: '100%', display: 'block' }} />
      <img
        src={ALTO_TAIL_IMG}
        alt=""
        className="alto-tail-wag"
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
      />
      <img
        src={ALTO_LEFT_EAR_IMG}
        alt=""
        className="alto-ear-left"
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
      />
      <img
        src={ALTO_RIGHT_EAR_IMG}
        alt=""
        className="alto-ear-right"
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
      />
      {mood === 'happy' && (
        <>
          <svg width={size * 0.3} height={size * 0.3} viewBox="0 0 24 24" style={{ position: 'absolute', top: -size * 0.05, right: -size * 0.08 }}>
            <path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" fill={COLORS.accent} />
          </svg>
          <svg width={size * 0.16} height={size * 0.16} viewBox="0 0 24 24" style={{ position: 'absolute', top: size * 0.32, left: -size * 0.06 }}>
            <path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" fill={COLORS.nice} />
          </svg>
        </>
      )}
      {mood === 'encourage' && (
        <svg width={size * 0.26} height={size * 0.26} viewBox="0 0 24 24" style={{ position: 'absolute', top: -size * 0.04, right: -size * 0.06 }}>
          <path d="M12 2 C18 10 18 16 12 20 C6 16 6 10 12 2 Z" fill={COLORS.sky} />
        </svg>
      )}
    </div>
  );
}

// Alto(admin) uses the real Alto dog image — same as the home screen mascot
function AltoAdminAvatar({ size = 48, style = {} }) {
  const h = size;
  return (
    <div style={{ width: size, height: h, borderRadius: '50%', overflow: 'hidden', background: '#F5F0E8', flexShrink: 0, position: 'relative', ...style }}>
      <img src={ALTO_HEAD_BODY_IMG} alt="Alto" style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }} />
      <img src={ALTO_TAIL_IMG} alt="" style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', objectFit: 'cover' }} />
    </div>
  );
}

function DogAvatarIcon({ avatarId, isAdmin = false, size = 48, style = {} }) {
  if (isAdmin) return <AltoAdminAvatar size={size} style={style} />;
  const avatar = DOG_AVATARS.find((a) => a.id === avatarId) || DOG_AVATARS[0];
  return (
    <div style={{ width: size, height: size, borderRadius: '50%', overflow: 'hidden', background: '#F5F0E8', flexShrink: 0, ...style }}>
      {avatar.svg(size)}
    </div>
  );
}

function SpeechBubble({ children }) {
  return (
    <div style={{ position: 'relative', background: COLORS.card, borderRadius: 16, padding: '11px 15px', fontSize: 13.5, lineHeight: 1.6, color: COLORS.text, flex: 1, boxShadow: '0 1px 2px rgba(0,0,0,0.04)' }}>
      <div style={{ position: 'absolute', left: -6, top: 18, width: 12, height: 12, background: COLORS.card, transform: 'rotate(45deg)', borderRadius: 2 }} />
      <div style={{ position: 'relative' }}>{children}</div>
    </div>
  );
}

function ConfirmModal({ message, confirmLabel, onConfirm, onCancel }) {
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.32)', backdropFilter: 'blur(2px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50, padding: 24 }}>
      <div style={{ background: COLORS.card, borderRadius: 20, padding: '24px 22px', maxWidth: 320, width: '100%', color: COLORS.text, boxShadow: '0 12px 28px rgba(0,0,0,0.18)' }}>
        <p style={{ margin: '0 0 22px', fontSize: 15, lineHeight: 1.6, textAlign: 'center', fontFamily: FONT_STACK }}>{message}</p>
        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={onCancel} style={{ flex: 1, padding: '12px', borderRadius: 12, border: 'none', background: COLORS.bg, color: COLORS.text, fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: FONT_STACK }}>
            キャンセル
          </button>
          <button onClick={onConfirm} style={{ flex: 1, padding: '12px', borderRadius: 12, border: 'none', background: COLORS.miss, color: '#fff', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: FONT_STACK }}>
            {confirmLabel || 'OK'}
          </button>
        </div>
      </div>
    </div>
  );
}

// Shown when saving a session on a date that already has a recorded session.
// Lets the person choose whether to combine the two into one record, or
// keep today's new session as a separate entry on the same date.
function SameDayModal({ date, onMerge, onSeparate, onCancel }) {
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.32)', backdropFilter: 'blur(2px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50, padding: 24 }}>
      <div style={{ background: COLORS.card, borderRadius: 20, padding: '22px 22px 16px', maxWidth: 340, width: '100%', color: COLORS.text, boxShadow: '0 12px 28px rgba(0,0,0,0.18)' }}>
        <p style={{ margin: '0 0 6px', fontSize: 16, fontWeight: 700, textAlign: 'center', fontFamily: FONT_STACK }}>同じ日の記録があります</p>
        <p style={{ margin: '0 0 20px', fontSize: 13.5, lineHeight: 1.6, textAlign: 'center', color: COLORS.mutedDark, fontFamily: FONT_STACK }}>
          {formatDateLong(date)}にはすでに記録があります。どうしますか?
        </p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <button onClick={onMerge} style={{ padding: '13px', borderRadius: 12, border: 'none', background: COLORS.accent, color: '#fff', fontSize: 14.5, fontWeight: 700, cursor: 'pointer', fontFamily: FONT_STACK }}>
            まとめて1日分にする
          </button>
          <button onClick={onSeparate} style={{ padding: '13px', borderRadius: 12, border: 'none', background: COLORS.bg, color: COLORS.text, fontSize: 14.5, fontWeight: 600, cursor: 'pointer', fontFamily: FONT_STACK }}>
            別の記録のまま残す
          </button>
          <button onClick={onCancel} style={{ padding: '11px', borderRadius: 12, border: 'none', background: 'transparent', color: COLORS.mutedDark, fontSize: 13.5, fontWeight: 600, cursor: 'pointer', fontFamily: FONT_STACK }}>
            キャンセル
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [sessions, setSessions] = useState([]);
  const [customClubs, setCustomClubs] = useState([]);
  const [nickname, setNickname] = useState('');
  const [isPublic, setIsPublic] = useState(false);
  const [avatarId, setAvatarId] = useState(DEFAULT_AVATAR_ID);
  const [showOnboarding, setShowOnboarding] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [showAvatarPicker, setShowAvatarPicker] = useState(false);
  const [nicknameChangeMode, setNicknameChangeMode] = useState(false);
  const [nicknameDraft, setNicknameDraft] = useState('');
  const [nicknameError, setNicknameError] = useState('');
  const [publicUsers, setPublicUsers] = useState([]);
  const [friendsLoading, setFriendsLoading] = useState(false);
  const [selectedFriend, setSelectedFriend] = useState(null);
  const [showAllUsers, setShowAllUsers] = useState(false);
  const [linkCopied, setLinkCopied] = useState(false);
  // Comments
  const [friendComments, setFriendComments] = useState({}); // { [nickname]: [comments] }
  const [commentDraft, setCommentDraft] = useState('');
  const [selectedStamp, setSelectedStamp] = useState(null);
  const [commentPosting, setCommentPosting] = useState(false);
  const [followedUsers, setFollowedUsers] = useState([]); // nicknames the user follows
  const [screen, setScreen] = useState('home'); // home | select | input | distInput | result | history | analysis | friends
  const [currentSession, setCurrentSession] = useState(null);
  const [selectedClub, setSelectedClub] = useState(null);
  const [selectedDistance, setSelectedDistance] = useState(null);
  const [homeMetric, setHomeMetric] = useState('overall');
  const [confirmState, setConfirmState] = useState(null);
  const [sameDayState, setSameDayState] = useState(null);
  const [expandedHistoryId, setExpandedHistoryId] = useState(null);
  const [expandedClubKey, setExpandedClubKey] = useState(null);
  const [editingDateId, setEditingDateId] = useState(null);
  const [editingClubKey, setEditingClubKey] = useState(null); // 'sessionId:club'
  const [clubEditDraft, setClubEditDraft] = useState(null); // { nice, slice, ... , memo }
  const [dateDraft, setDateDraft] = useState('');
  const [showAddClub, setShowAddClub] = useState(false);
  const [newClubName, setNewClubName] = useState('');

  useEffect(() => {
    (async () => {
      const s = await loadKey(SESSIONS_KEY, []);
      const c = await loadKey(CLUBS_KEY, []);
      const nick = await loadKey('user-nickname', '');
      const pub = await loadKey('user-public', false);
      const followed = await loadKey('user-followed', []);
      const avatar = await loadKey('user-avatar', DEFAULT_AVATAR_ID);
      setSessions(Array.isArray(s) ? [...s].sort((a, b) => a.id - b.id) : []);
      setCustomClubs(Array.isArray(c) ? c : []);
      setFollowedUsers(Array.isArray(followed) ? followed : []);
      setAvatarId(avatar || DEFAULT_AVATAR_ID);
      if (nick) {
        setNickname(nick);
        setIsPublic(!!pub);
      } else {
        setShowOnboarding(true);
      }
      setLoaded(true);
      // Ensure Alto admin exists in Firebase (fire and forget)
      ensureAltoAdmin();
    })();
  }, []);

  const allClubs = useMemo(() => {
    const set = new Set(CLUB_PRESETS);
    customClubs.forEach((c) => set.add(c));
    return [...set];
  }, [customClubs]);

  const clubsWithData = useMemo(() => {
    const set = new Set();
    sessions.forEach((s) => Object.keys(s.clubs).forEach((c) => set.add(c)));
    const ordered = CLUB_PRESETS.filter((c) => set.has(c));
    const customs = [...set].filter((c) => !CLUB_PRESETS.includes(c));
    return [...ordered, ...customs];
  }, [sessions]);

  const allClubTendencyCounts = useMemo(() => aggregateAllClubs(sessions), [sessions]);

  const allDistCounts = useMemo(() => {
    const map = {};
    sessions.forEach((s) => {
      Object.entries(s.distances || {}).forEach(([dist, c]) => {
        if (!map[dist]) map[dist] = emptyDistCounts();
        DIST_RESULT_TYPES.forEach((t) => { map[dist][t.key] += c[t.key] || 0; });
        // carry computed score for display
        const score = computeDistScore(map[dist]);
        if (score !== null) map[dist].score = score;
      });
    });
    return map;
  }, [sessions]);
  const chartData = useMemo(() => {
    let filtered;
    if (homeMetric === 'overall') {
      filtered = sessions.map((s) => ({ date: s.date, score: s.overallScore }));
    } else {
      filtered = sessions
        .filter((s) => s.clubs[homeMetric])
        .map((s) => ({ date: s.date, score: s.clubs[homeMetric].score }));
    }
    return filtered
      .sort((a, b) => a.date.localeCompare(b.date))
      .map((d) => ({ label: formatDateShort(d.date), score: roundScore(d.score) }));
  }, [sessions, homeMetric]);

  const latestSession = sessions.length ? sessions[sessions.length - 1] : null;

  async function persistSessions(next) {
    setSessions(next);
    await saveKey(SESSIONS_KEY, next);
    // Sync public summary to shared storage if user is registered and public
    if (nickname && isPublic) {
      const record = await loadUserRecord(nickname);
      if (record) {
        await saveUserRecord({ ...record, summary: buildPublicSummary(next) });
      }
    }
  }
  async function persistCustomClubs(next) {
    setCustomClubs(next);
    await saveKey(CLUBS_KEY, next);
  }

  async function registerNickname(nick) {
    const trimmed = nick.trim();
    if (!trimmed) { setNicknameError('ニックネームを入力してください'); return; }
    if (trimmed.length > 20) { setNicknameError('20文字以内で入力してください'); return; }
    setNicknameError('');
    // Check if nickname is taken
    const existing = await loadUserRecord(trimmed);
    if (existing) { setNicknameError('このニックネームはすでに使われています'); return; }
    // Register
    const record = { nickname: trimmed, createdAt: new Date().toISOString(), isPublic: false, summary: buildPublicSummary(sessions) };
    await saveUserRecord(record);
    await saveKey('user-nickname', trimmed);
    await saveKey('user-public', false);
    setNickname(trimmed);
    setIsPublic(false);
    setShowOnboarding(false);
  }

  async function updatePublicSetting(newIsPublic) {
    setIsPublic(newIsPublic);
    await saveKey('user-public', newIsPublic);
    const record = await loadUserRecord(nickname);
    if (record) {
      await saveUserRecord({ ...record, isPublic: newIsPublic, summary: buildPublicSummary(sessions) });
    }
  }

  async function changeNickname(newNick) {
    const trimmed = newNick.trim();
    if (!trimmed) { setNicknameError('ニックネームを入力してください'); return; }
    if (trimmed.length > 20) { setNicknameError('20文字以内で入力してください'); return; }
    if (trimmed === nickname) { setNicknameChangeMode(false); setNicknameError(''); return; }
    setNicknameError('');
    const existing = await loadUserRecord(trimmed);
    if (existing) { setNicknameError('このニックネームはすでに使われています'); return; }
    // Delete old record, create new one
    try { await fbDelete(`users/${encodeURIComponent(nickname)}`); } catch {}
    const record = { nickname: trimmed, createdAt: new Date().toISOString(), isPublic, summary: buildPublicSummary(sessions) };
    await saveUserRecord(record);
    await saveKey('user-nickname', trimmed);
    setNickname(trimmed);
    setNicknameChangeMode(false);
    setNicknameDraft('');
  }

  async function changeAvatar(newAvatarId) {
    setAvatarId(newAvatarId);
    await saveKey('user-avatar', newAvatarId);
    setShowAvatarPicker(false);
  }

  function copyAppLink() {
    const url = window.location.href;
    const done = () => { setLinkCopied(true); setTimeout(() => setLinkCopied(false), 2000); };
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(done).catch(() => {
        const el = document.createElement('textarea');
        el.value = url; document.body.appendChild(el); el.select();
        document.execCommand('copy'); document.body.removeChild(el); done();
      });
    } else {
      const el = document.createElement('textarea');
      el.value = url; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el); done();
    }
  }

  async function loadFriends() {
    setFriendsLoading(true);
    const users = await listPublicUsers();
    const others = users.filter((u) => u.nickname !== nickname && u.nickname !== ALTO_ADMIN_NICKNAME);
    // Build self entry from local data
    const selfRecord = await loadUserRecord(nickname);
    const selfUser = selfRecord
      ? { ...selfRecord, isSelf: true, avatarId, summary: { ...buildPublicSummary(sessions), hotClub: selfRecord.summary?.hotClub } }
      : { nickname, isSelf: true, avatarId, isPublic, summary: buildPublicSummary(sessions) };
    // Helper: get latest session date from summary
    const latestDate = (u) => {
      const scores = u.summary && u.summary.overallScores;
      return scores && scores.length ? scores[scores.length - 1].date : '';
    };
    // Sort Alto admin + others together by latest date, newest first
    const sortedOthers = [getAltoAdminUser(), ...others].sort((a, b) =>
      latestDate(b).localeCompare(latestDate(a))
    );
    const allUsers = [selfUser, ...sortedOthers];
    setPublicUsers(allUsers);
    // Load latest comment for each non-admin user in parallel
    const commentResults = await Promise.all(
      allUsers.filter((u) => !u.isAdmin).map(async (u) => {
        const comments = await loadComments(u.nickname);
        return [u.nickname, comments];
      })
    );
    const commentMap = {};
    commentResults.forEach(([nick, comments]) => { commentMap[nick] = comments; });
    setFriendComments((prev) => ({ ...prev, ...commentMap }));
    setFriendsLoading(false);
  }

  async function loadCommentsForFriend(targetNickname) {
    const comments = await loadComments(targetNickname);
    setFriendComments((prev) => ({ ...prev, [targetNickname]: comments }));
  }

  async function submitComment(targetNickname) {
    if (!selectedStamp && !commentDraft.trim()) return;
    setCommentPosting(true);
    await postComment(targetNickname, nickname, selectedStamp, commentDraft);
    setCommentDraft('');
    setSelectedStamp(null);
    await loadCommentsForFriend(targetNickname);
    setCommentPosting(false);
  }

  async function toggleFollow(targetNickname) {
    const isFollowing = followedUsers.includes(targetNickname);
    const next = isFollowing
      ? followedUsers.filter((n) => n !== targetNickname)
      : [...followedUsers, targetNickname];
    setFollowedUsers(next);
    await saveKey('user-followed', next);
  }

  function startPractice() {
    setCurrentSession({ date: todayISO(), clubs: {}, distances: {} });
    setSelectedClub(null);
    setSelectedDistance(null);
    setScreen('select');
  }

  function selectClub(club) {
    setSelectedClub(club);
    setCurrentSession((prev) => {
      if (prev.clubs[club]) return prev;
      return { ...prev, clubs: { ...prev.clubs, [club]: emptyCounts() } };
    });
    setScreen('input');
  }

  function selectDistance(dist) {
    setSelectedDistance(dist);
    setCurrentSession((prev) => {
      const key = String(dist);
      if (prev.distances && prev.distances[key]) return prev;
      return { ...prev, distances: { ...(prev.distances || {}), [key]: emptyDistCounts() } };
    });
    setScreen('distInput');
  }

  function updateCount(club, key, delta) {
    setCurrentSession((prev) => {
      const counts = { ...(prev.clubs[club] || emptyCounts()) };
      counts[key] = Math.max(0, (counts[key] || 0) + delta);
      return { ...prev, clubs: { ...prev.clubs, [club]: counts } };
    });
  }

  function updateDistCount(dist, key, delta) {
    setCurrentSession((prev) => {
      const dkey = String(dist);
      const counts = { ...((prev.distances && prev.distances[dkey]) || emptyDistCounts()) };
      counts[key] = Math.max(0, (counts[key] || 0) + delta);
      return { ...prev, distances: { ...(prev.distances || {}), [dkey]: counts } };
    });
  }

  function updateClubMemo(club, memo) {
    setCurrentSession((prev) => {
      const counts = { ...(prev.clubs[club] || emptyCounts()), memo };
      return { ...prev, clubs: { ...prev.clubs, [club]: counts } };
    });
  }

  function finishPractice() {
    setCurrentSession((prev) => {
      const clubsWithScores = {};
      Object.entries(prev.clubs).forEach(([club, counts]) => {
        if (totalCount(counts) > 0) {
          clubsWithScores[club] = { ...counts, score: computeClubScore(counts) };
        }
      });
      const distancesWithScores = {};
      Object.entries(prev.distances || {}).forEach(([dist, counts]) => {
        if (totalDistCount(counts) > 0) {
          distancesWithScores[dist] = { ...counts, score: computeDistScore(counts) };
        }
      });
      return { ...prev, clubs: clubsWithScores, distances: distancesWithScores };
    });
    setScreen('result');
  }


  function saveSession() {
    const existing = sessions.find((s) => s.date === currentSession.date);
    if (existing) {
      setSameDayState({ existing });
      return;
    }
    commitNewSession();
  }

  // Saves currentSession as a brand-new entry (used when there's no same-day
  // conflict, or when the person explicitly chooses to keep it separate).
  // When sameDayState.movingSession is set, this instead finalizes a history
  // date edit by keeping the moved session separate (no merge) on the new date.
  function commitNewSession() {
    if (sameDayState && sameDayState.movingSession) {
      const { movingSession, newDate } = sameDayState;
      persistSessions(sessions.map((s) => (s.id === movingSession.id ? { ...s, date: newDate } : s)));
      setSameDayState(null);
      return;
    }
    const overallScore = computeOverallScore(currentSession.clubs);
    const newSession = {
      id: Date.now(),
      date: currentSession.date,
      clubs: currentSession.clubs,
      distances: currentSession.distances || {},
      overallScore,
    };
    persistSessions([...sessions, newSession]);
    setCurrentSession(null);
    setSelectedClub(null);
    setSelectedDistance(null);
    setSameDayState(null);
    setScreen('home');
  }

  // Combines currentSession into the existing same-day session, summing raw
  // shot counts per club/distance and recomputing scores from the combined totals.
  // When sameDayState.movingSession is set, this instead finalizes a history
  // date edit by merging the moved session into the existing one on that date.
  function commitMergedSession(existing) {
    if (sameDayState && sameDayState.movingSession) {
      const { movingSession } = sameDayState;
      const mergedClubs = mergeClubResults(existing.clubs, movingSession.clubs);
      const mergedDistances = mergeDistResults(existing.distances || {}, movingSession.distances || {});
      const overallScore = computeOverallScore(mergedClubs);
      const updated = { ...existing, clubs: mergedClubs, distances: mergedDistances, overallScore };
      persistSessions(
        sessions
          .filter((s) => s.id !== movingSession.id)
          .map((s) => (s.id === existing.id ? updated : s))
      );
      setSameDayState(null);
      return;
    }
    const mergedClubs = mergeClubResults(existing.clubs, currentSession.clubs);
    const mergedDistances = mergeDistResults(existing.distances || {}, currentSession.distances || {});
    const overallScore = computeOverallScore(mergedClubs);
    const updated = { ...existing, clubs: mergedClubs, distances: mergedDistances, overallScore };
    persistSessions(sessions.map((s) => (s.id === existing.id ? updated : s)));
    setCurrentSession(null);
    setSelectedClub(null);
    setSelectedDistance(null);
    setSameDayState(null);
    setScreen('home');
  }

  function requestCancelPractice() {
    setConfirmState({
      message: '記録中のデータは失われます。練習をやめますか?',
      confirmLabel: 'やめる',
      onConfirm: () => {
        setCurrentSession(null);
        setSelectedClub(null);
        setSelectedDistance(null);
        setConfirmState(null);
        setScreen('home');
      },
    });
  }

  function addCustomClub() {
    const name = newClubName.trim();
    if (!name) { setShowAddClub(false); return; }
    if (!allClubs.includes(name)) {
      persistCustomClubs([...customClubs, name]);
    }
    setNewClubName('');
    setShowAddClub(false);
    selectClub(name);
  }

  function requestDeleteSession(id) {
    setConfirmState({
      message: 'この記録を削除しますか?この操作は取り消せません。',
      confirmLabel: '削除する',
      onConfirm: () => {
        persistSessions(sessions.filter((s) => s.id !== id));
        setExpandedHistoryId(null);
        setConfirmState(null);
      },
    });
  }

  function startDateEdit(session) {
    setEditingDateId(session.id);
    setDateDraft(session.date);
  }

  // Commits a date change for a history entry. If another session already
  // exists on the target date, offers the same merge/separate/cancel choice
  // used when saving a fresh practice session, to keep behavior consistent.
  function commitDateEdit(session) {
    if (!dateDraft || dateDraft === session.date) {
      setEditingDateId(null);
      return;
    }
    const collision = sessions.find((s) => s.id !== session.id && s.date === dateDraft);
    if (collision) {
      setSameDayState({
        existing: collision,
        movingSession: session,
        newDate: dateDraft,
      });
      setEditingDateId(null);
      return;
    }
    persistSessions(sessions.map((s) => (s.id === session.id ? { ...s, date: dateDraft } : s)));
    setEditingDateId(null);
  }

  function startClubEdit(sessionId, club, counts) {
    const key = `${sessionId}:${club}`;
    setEditingClubKey(key);
    setExpandedClubKey(key);
    // Draft copies all count fields + memo
    const draft = {};
    RESULT_TYPES.forEach((t) => { draft[t.key] = counts[t.key] || 0; });
    draft.memo = counts.memo || '';
    setClubEditDraft(draft);
  }

  function commitClubEdit(sessionId, club) {
    if (!clubEditDraft) { setEditingClubKey(null); return; }
    const updatedCounts = { ...clubEditDraft, score: computeClubScore(clubEditDraft) };
    persistSessions(sessions.map((s) => {
      if (s.id !== sessionId) return s;
      const newClubs = { ...s.clubs, [club]: updatedCounts };
      const overallScore = computeOverallScore(newClubs);
      return { ...s, clubs: newClubs, overallScore };
    }));
    setEditingClubKey(null);
    setClubEditDraft(null);
  }

  const anyDoneInSession = currentSession
    ? Object.values(currentSession.clubs).some((c) => totalCount(c) > 0) ||
      Object.values(currentSession.distances || {}).some((c) => totalDistCount(c) > 0)
    : false;

  // ---------- screens ----------
  function renderHome() {
    const altoState = getHomeAltoState(sessions);
    return (
      <>
        <div style={{ padding: '20px 20px 12px' }}>
          <p style={{ fontFamily: FONT_STACK, fontSize: 30, letterSpacing: -0.5, fontWeight: 700, margin: 0, color: COLORS.text }}>Alto Golf</p>
          {nickname && <p style={{ fontSize: 12, color: COLORS.mutedDark, margin: '2px 0 0' }}>{nickname}{isPublic ? ' · 公開中' : ''}</p>}
          <p style={{ fontSize: 14, color: COLORS.mutedDark, margin: '8px 0 0' }}>
            {latestSession ? `前回 ${formatDateLong(latestSession.date)} ・ ${roundScore(latestSession.overallScore)}点` : '打ちっぱなしの記録をつけて、成長を可視化しよう'}
          </p>
        </div>

        {/* Your Hot One 🔥 */}
        {sessions.length >= 1 && <MyClubCard sessions={sessions} />}

        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10, padding: '0 20px 14px' }}>
          <AltoDog mood={altoState.mood} size={56} />
          <SpeechBubble>{altoState.message}</SpeechBubble>
        </div>

        <div style={{ padding: '0 20px 18px' }}>
          <button onClick={startPractice} style={{ ...primaryButton, margin: 0 }}>練習を始める</button>
        </div>

        {sessions.length === 0 ? (
          <div style={cardStyle}>
            <p style={{ fontSize: 14, lineHeight: 1.8, margin: '4px 0 16px', color: COLORS.mutedDark }}>
              まだ記録がありません。上のボタンをタップして最初のセッションを記録しましょう。
            </p>
          </div>
        ) : (
          <>
            <RingLabel>スコアの推移</RingLabel>
            <div style={cardStyle}>
              <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 14 }}>
                <Chip active={homeMetric === 'overall'} label="全体" onClick={() => setHomeMetric('overall')} />
                {clubsWithData.map((c) => (
                  <Chip key={c} active={homeMetric === c} label={c} onClick={() => setHomeMetric(c)} />
                ))}
              </div>
              {chartData.length === 0 ? (
                <p style={{ fontSize: 13, color: COLORS.mutedDark, padding: '20px 0', textAlign: 'center' }}>このクラブの記録はまだありません</p>
              ) : (
                <ScoreAreaChart data={chartData} height={190} />
              )}
            </div>

            <RingLabel>ナイス率</RingLabel>
            <div style={cardStyle}>
              <NiceRateSection sessions={sessions} />
            </div>
          </>
        )}

        <div style={{ height: 8 }} />
      </>
    );
  }

  function renderSelect() {
    if (!currentSession) return null;
    return (
      <>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 20px 4px' }}>
          <button onClick={requestCancelPractice} style={iconBtnStyle}><IconX size={22} /></button>
          <p style={{ fontSize: 13, color: COLORS.mutedDark, margin: 0 }}>{formatDateLong(currentSession.date)}</p>
          <div style={{ width: 34 }} />
        </div>
        <div style={{ padding: '8px 20px 4px' }}>
          <p style={{ fontSize: 22, fontWeight: 700, letterSpacing: -0.3, margin: '8px 0 4px', color: COLORS.text }}>クラブを選ぶ</p>
          <p style={{ fontSize: 14, color: COLORS.mutedDark, margin: '0 0 18px' }}>練習するクラブをタップして、結果を記録しましょう</p>
        </div>

        <div style={{ padding: '0 20px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
            {allClubs.map((club) => {
              const done = currentSession.clubs[club] && totalCount(currentSession.clubs[club]) > 0;
              return (
                <button
                  key={club}
                  onClick={() => selectClub(club)}
                  style={{
                    position: 'relative',
                    border: 'none',
                    borderRadius: 14,
                    background: done ? COLORS.fairwaySoft : COLORS.card,
                    color: done ? COLORS.fairway : COLORS.text,
                    padding: '15px 4px',
                    fontSize: 14,
                    fontWeight: 600,
                    cursor: 'pointer',
                    fontFamily: FONT_STACK,
                    boxShadow: '0 1px 2px rgba(0,0,0,0.04)',
                  }}
                >
                  {club}
                  {done && (
                    <span style={{ position: 'absolute', top: -6, right: -6, background: COLORS.fairway, borderRadius: '50%', width: 20, height: 20, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 3px rgba(0,0,0,0.15)' }}>
                      <IconCheck size={12} color="#fff" />
                    </span>
                  )}
                </button>
              );
            })}

      ...distEntries.map(([k, v]) => ({ key: `d_${k}`, label: `${k}y`, score: v.score })),
