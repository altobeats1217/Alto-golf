<script>
  // Surface any uncaught error directly on the page, since a blank white
  // screen with no console access (mobile) is otherwise undebuggable.
  window.addEventListener('error', function (e) {
    showBootError((e.message || 'Unknown error') + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n' + (e.error && e.error.stack ? e.error.stack : ''));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showBootError('Promise rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });
  function showBootError(detail) {
    var el = document.getElementById('boot-error');
    var d = document.getElementById('boot-error-detail');
    if (el && d) {
      d.textContent = detail;
      el.style.display = 'block';
    }
  }
  function setStatus(s) {
    var el = document.getElementById('boot-status');
    if (el) el.textContent = s;
  }
  setStatus('scripts loading…');
</script>

// Merge two sessions' club results by summing raw shot counts per club and
// recomputing each club's score from the combined counts (so the merged
// score reflects all shots, not an average of two averages).
function mergeClubResults(clubsA, clubsB) {
  const merged = {};
  const allClubs = new Set([...Object.keys(clubsA), ...Object.keys(clubsB)]);
  allClubs.forEach((club) => {
    const counts = emptyCounts();
    RESULT_TYPES.forEach((t) => {
      counts[t.key] = (clubsA[club]?.[t.key] || 0) + (clubsB[club]?.[t.key] || 0);
    });
    merged[club] = { ...counts, score: computeClubScore(counts) };
  });
  return merged;
}

function computeOverallScore(clubs) {
  const entries = Object.values(clubs);
  return entries.length ? entries.reduce((sum, c) => sum + c.score, 0) / entries.length : 0;
}

// ---------- helpers ----------
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function formatDateShort(iso) {
  const [, m, d] = iso.split('-');
  return `${parseInt(m, 10)}/${parseInt(d, 10)}`;
}
function formatDateLong(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  const date = new Date(y, m - 1, d);
  return `${m}月${d}日(${days[date.getDay()]})`;
}
function emptyCounts() {
  const c = {};
  RESULT_TYPES.forEach((t) => { c[t.key] = 0; });
  return c;
}
function totalCount(counts) {
  if (!counts) return 0;
  return RESULT_TYPES.reduce((s, t) => s + (counts[t.key] || 0), 0);
}
function computeClubScore(counts) {
  const total = totalCount(counts);
  if (total === 0) return null;
  const weighted = RESULT_TYPES.reduce((s, t) => s + (counts[t.key] || 0) * t.points, 0);
  return weighted / total;
}
function roundScore(score) {
  return Math.round(score);
}
function scoreColor(score) {
  if (score >= 80) return COLORS.scoreGood;
  if (score >= 60) return COLORS.scoreMid;
  return COLORS.miss;
}

const RESULT_LABELS = { nice: 'ナイス', slice: 'スライス', hook: 'フック', top: 'トップ', fat: 'ダフリ', shank: 'シャンク' };
const MISS_KEYS = ['slice', 'hook', 'top', 'fat', 'shank'];

// Aggregate counts for a club across all sessions (optionally limited to the most recent N)
function aggregateClubCounts(sessions, club, limit) {
  const list = limit ? sessions.slice(-limit) : sessions;
  const totals = emptyCounts();
  list.forEach((s) => {
    const c = s.clubs[club];
    if (!c) return;
    RESULT_TYPES.forEach((t) => { totals[t.key] += c[t.key] || 0; });
  });
  return totals;
}

// Find the dominant miss type from a counts object; returns null if no misses
function dominantMiss(counts) {
  let best = null;
  MISS_KEYS.forEach((k) => {
    if (counts[k] > 0 && (!best || counts[k] > counts[best])) best = k;
  });
  return best;
}

// Alto's analysis on the home screen: leads with overall trend (score
// direction, nice-shot rate, dominant miss pattern across all clubs) and
// only calls out a specific club when one tendency clearly stands out.
function getHomeAltoState(sessions) {
  if (sessions.length === 0) {
    return { mood: 'okay', message: 'はじめまして、Altoです。練習を記録して、一緒に成長を見ていこう!' };
  }
  if (sessions.length === 1) {
    return { mood: 'okay', message: '記録スタート!次の練習も待ってるよ。' };
  }

  const last = sessions[sessions.length - 1];
  const prev = sessions[sessions.length - 2];
  const diff = last.overallScore - prev.overallScore;

  // Look at the last few sessions for overall (not per-club) tendencies.
  const recent = sessions.slice(-5);
  const overallTotals = emptyCounts();
  const clubTotals = {};
  recent.forEach((s) => {
    Object.entries(s.clubs).forEach(([club, c]) => {
      if (!clubTotals[club]) clubTotals[club] = emptyCounts();
      RESULT_TYPES.forEach((t) => {
        clubTotals[club][t.key] += c[t.key] || 0;
        overallTotals[t.key] += c[t.key] || 0;
      });
    });
  });

  const totalShots = totalCount(overallTotals);
  const niceRate = totalShots > 0 ? overallTotals.nice / totalShots : 0;
  const topMiss = dominantMiss(overallTotals);
  const topMissCount = topMiss ? overallTotals[topMiss] : 0;
  const topMissShare = totalShots > 0 ? topMissCount / totalShots : 0;

  // A club only gets called out by name if it's a real outlier: noticeably
  // worse than the rest, with enough shots to be meaningful.
  const clubScores = Object.entries(clubTotals)
    .map(([club, counts]) => [club, totalCount(counts), computeClubScore(counts)])
    .filter(([, total]) => total >= 5);
  let outlierClub = null, outlierScore = 101;
  if (clubScores.length >= 2) {
    const avgOfRest = (excludeClub) => {
      const others = clubScores.filter(([c]) => c !== excludeClub);
      return others.reduce((sum, [, , s]) => sum + s, 0) / others.length;
    };
    clubScores.forEach(([club, , score]) => {
      const rest = avgOfRest(club);
      if (score < rest - 18 && score < outlierScore) { outlierScore = score; outlierClub = club; }
    });
  }

  // Trending up
  if (diff > 0.5) {
    if (niceRate >= 0.6) {
      return { mood: 'happy', message: `前回よりスコアが上がってるね!ナイスショットの割合も高くて、いい感じに仕上がってきてる。` };
    }
    return { mood: 'happy', message: '前回よりスコアが上がってるね!この調子をキープしよう。' };
  }

  // Trending down
  if (diff < -0.5) {
    if (topMiss && topMissShare >= 0.3) {
      return { mood: 'encourage', message: `最近${RESULT_LABELS[topMiss]}の割合が多めだね。全体的にそこを意識するだけでも変わってくるはず。一緒に立て直そう!` };
    }
    return { mood: 'encourage', message: '次はもっと良くなるよ。焦らず一緒に頑張ろう!' };
  }

  // Flat — surface whichever insight is most useful
  if (outlierClub) {
    return { mood: 'okay', message: `全体は安定してきたね。${outlierClub}だけ少し苦戦気味だから、次はそこに少し時間を使ってみよう。` };
  }
  if (topMiss && topMissShare >= 0.35) {
    return { mood: 'okay', message: `全体的に${RESULT_LABELS[topMiss]}が目立つかな。クラブを問わず、次回はそこを少し意識してみよう。` };
  }
  if (niceRate >= 0.55) {
    return { mood: 'okay', message: '全体的に安定してきてるね。この調子で続けよう。' };
  }
  return { mood: 'okay', message: '今日も練習、がんばろう!' };
}

// Alto's analysis right after a session: leads with the overall nice-shot
// rate and dominant miss pattern for the whole session, and only names a
// specific club when it's a clear outlier relative to the rest of the day.
function getResultAltoState(session) {
  const clubEntries = Object.entries(session.clubs);
  const overall = clubEntries.length
    ? clubEntries.reduce((sum, [, c]) => sum + c.score, 0) / clubEntries.length
    : 0;

  if (clubEntries.length === 0) {
    return { mood: 'okay', message: 'お疲れさま!次の練習も待ってるよ。' };
  }

  const sessionTotals = emptyCounts();
  clubEntries.forEach(([, c]) => { RESULT_TYPES.forEach((t) => { sessionTotals[t.key] += c[t.key] || 0; }); });
  const totalShots = totalCount(sessionTotals);
  const niceRate = totalShots > 0 ? sessionTotals.nice / totalShots : 0;
  const topMiss = dominantMiss(sessionTotals);
  const topMissShare = topMiss && totalShots > 0 ? sessionTotals[topMiss] / totalShots : 0;

  // Only call out a club if it's a clear outlier vs. the rest of the day.
  let outlierClub = null, outlierScore = 101;
  if (clubEntries.length >= 2) {
    clubEntries.forEach(([club, c]) => {
      const others = clubEntries.filter(([c2]) => c2 !== club);
      const avgOfRest = others.reduce((sum, [, oc]) => sum + oc.score, 0) / others.length;
      if (c.score < avgOfRest - 20 && c.score < outlierScore) { outlierScore = c.score; outlierClub = club; }
    });
  }

  if (overall >= 80) {
    if (niceRate >= 0.65) {
      return { mood: 'happy', message: 'ナイスラウンド!ナイスショットの割合がとても高かったね。絶好調だ!' };
    }
    return { mood: 'happy', message: 'ナイスラウンド!絶好調だね!' };
  }

  if (overall >= 60) {
    if (outlierClub) {
      return { mood: 'okay', message: `いい感じ!全体的には良かったけど、${outlierClub}だけ少し苦戦してたね。次回そこを意識してみよう。` };
    }
    return { mood: 'okay', message: 'いい感じ!この調子で次も頑張ろう。' };
  }

  if (topMiss && topMissShare >= 0.3) {
    return { mood: 'encourage', message: `今日は${RESULT_LABELS[topMiss]}が多かったね。クラブを問わず出てたから、次の練習はそこから一緒に直していこう。` };
  }
  if (outlierClub) {
    return { mood: 'encourage', message: `今日は${outlierClub}が特に苦戦してたね。次回はそこを中心に見直してみよう。` };
  }
  return { mood: 'encourage', message: '次はもっと良くなるよ。一緒に頑張ろう!' };
}

// Self-contained SVG area chart — replaces the recharts dependency so the
// standalone build has no external chart library to fail to load.
// data: [{ label, score }], height in px. Renders with a responsive width
// via a viewBox + percentage-width SVG, plus a tap/hover tooltip.
function ScoreAreaChart({ data, height = 190 }) {
  const [activeIndex, setActiveIndex] = useState(null);
  if (!data || data.length === 0) return null;

  const W = 320; // virtual coordinate width; SVG scales to container via viewBox
  const H = height;
  const padL = 28, padR = 8, padT = 10, padB = 22;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const n = data.length;
  const xFor = (i) => (n === 1 ? padL + plotW / 2 : padL + (i / (n - 1)) * plotW);
  const yFor = (score) => padT + plotH - (Math.max(0, Math.min(100, score)) / 100) * plotH;

  const linePoints = data.map((d, i) => `${xFor(i)},${yFor(d.score)}`).join(' ');
  const areaPoints = `${xFor(0)},${padT + plotH} ${linePoints} ${xFor(n - 1)},${padT + plotH}`;

  const gridValues = [0, 25, 50, 75, 100];

  const handleMove = (clientX, currentTarget) => {
    const rect = currentTarget.getBoundingClientRect();
    const relX = ((clientX - rect.left) / rect.width) * W;
    let closest = 0, closestDist = Infinity;
    data.forEach((d, i) => {
      const dist = Math.abs(xFor(i) - relX);
      if (dist < closestDist) { closestDist = dist; closest = i; }
    });
    setActiveIndex(closest);
  };

  const active = activeIndex !== null ? data[activeIndex] : null;
  const tooltipX = active ? xFor(activeIndex) : 0;
  const tooltipLeftPct = active ? (tooltipX / W) * 100 : 0;

  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <svg
        width="100%"
        height={H}
        viewBox={`0 0 ${W} ${H}`}
        preserveAspectRatio="none"
        onMouseMove={(e) => handleMove(e.clientX, e.currentTarget)}
        onMouseLeave={() => setActiveIndex(null)}
        onTouchStart={(e) => handleMove(e.touches[0].clientX, e.currentTarget)}
        onTouchMove={(e) => handleMove(e.touches[0].clientX, e.currentTarget)}
        onTouchEnd={() => setActiveIndex(null)}
        style={{ display: 'block', touchAction: 'pan-y' }}
      >
        <defs>
          <linearGradient id="fairwayFill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={COLORS.fairway} stopOpacity="0.22" />
            <stop offset="100%" stopColor={COLORS.fairway} stopOpacity="0" />
          </linearGradient>
        </defs>

        {gridValues.map((v) => (
          <line
            key={v}
            x1={padL} x2={W - padR}
            y1={yFor(v)} y2={yFor(v)}
            stroke={COLORS.border}
            strokeWidth="1"
          />
        ))}

        {gridValues.map((v) => (
          <text key={v} x={padL - 6} y={yFor(v) + 3} fontSize="9" fill={COLORS.mutedDark} textAnchor="end">{v}</text>
        ))}

        {data.map((d, i) => (
          <text key={i} x={xFor(i)} y={H - 6} fontSize="9" fill={COLORS.mutedDark} textAnchor="middle">{d.label}</text>
        ))}

        <polygon points={areaPoints} fill="url(#fairwayFill)" />
        <polyline points={linePoints} fill="none" stroke={COLORS.fairway} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />

        {data.map((d, i) => (
          <circle
            key={i}
            cx={xFor(i)} cy={yFor(d.score)}
            r={activeIndex === i ? 4.5 : 3}
            fill={COLORS.fairway}
            stroke="#fff"
            strokeWidth={activeIndex === i ? 1.5 : 0}
          />
        ))}

        {active && (
          <line x1={tooltipX} x2={tooltipX} y1={padT} y2={padT + plotH} stroke={COLORS.fairway} strokeWidth="1" strokeDasharray="3 3" opacity="0.4" />
        )}
      </svg>

      {active && (
        <div
          style={{
            position: 'absolute',
            top: 0,
            left: `${tooltipLeftPct}%`,
            transform: `translateX(${tooltipLeftPct > 80 ? '-100%' : tooltipLeftPct < 20 ? '0%' : '-50%'})`,
            background: '#fff',
            borderRadius: 10,
            padding: '6px 10px',
            fontSize: 12,
            fontWeight: 600,
            color: COLORS.text,
            boxShadow: '0 2px 8px rgba(0,0,0,0.12)',
            pointerEvents: 'none',
            whiteSpace: 'nowrap',
          }}
        >
          {active.label} ・ {active.score}点
        </div>
      )}
    </div>
  );
}

function Sparkline({ scores }) {
  if (!scores || scores.length < 2) return null;
  const w = 96, h = 34, pad = 3;
  const points = scores.map((s, i) => {
    const x = pad + (i / (scores.length - 1)) * (w - pad * 2);
    const y = h - pad - (Math.max(0, Math.min(100, s)) / 100) * (h - pad * 2);
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={points} fill="none" stroke={COLORS.fairway} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

// Alto — recreated from the original Alto English mascot artwork.
// mood: 'happy' | 'okay' | 'encourage'
function AltoDog({ mood = 'okay', size = 64 }) {
  const h = size * (193 / 180);
  return (
    <div style={{ position: 'relative', width: size, height: h, flexShrink: 0 }}>
      <img src={ALTO_HEAD_BODY_IMG} alt="Alto" style={{ width: '100%', height: '100%', display: 'block' }} />
      <img
        src={ALTO_TAIL_IMG}
        alt=""
        className="alto-tail-wag"
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
      />
      <img
        src={ALTO_LEFT_EAR_IMG}
        alt=""
        className="alto-ear-left"
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
      />
      <img
        src={ALTO_RIGHT_EAR_IMG}
        alt=""
        className="alto-ear-right"
        style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%' }}
      />
      {mood === 'happy' && (
        <>
          <svg width={size * 0.3} height={size * 0.3} viewBox="0 0 24 24" style={{ position: 'absolute', top: -size * 0.05, right: -size * 0.08 }}>
            <path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" fill={COLORS.accent} />
          </svg>
          <svg width={size * 0.16} height={size * 0.16} viewBox="0 0 24 24" style={{ position: 'absolute', top: size * 0.32, left: -size * 0.06 }}>
            <path d="M12 2 L14.5 9.5 L22 12 L14.5 14.5 L12 22 L9.5 14.5 L2 12 L9.5 9.5 Z" fill={COLORS.nice} />
          </svg>
        </>
      )}
      {mood === 'encourage' && (
        <svg width={size * 0.26} height={size * 0.26} viewBox="0 0 24 24" style={{ position: 'absolute', top: -size * 0.04, right: -size * 0.06 }}>
          <path d="M12 2 C18 10 18 16 12 20 C6 16 6 10 12 2 Z" fill={COLORS.sky} />
        </svg>
      )}
    </div>
  );
}

function SpeechBubble({ children }) {
  return (

function ConfirmModal({ message, confirmLabel, onConfirm, onCancel }) {
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.32)', backdropFilter: 'blur(2px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50, padding: 24 }}>
      <div style={{ background: COLORS.card, borderRadius: 20, padding: '24px 22px', maxWidth: 320, width: '100%', color: COLORS.text, boxShadow: '0 12px 28px rgba(0,0,0,0.18)' }}>
        <p style={{ margin: '0 0 22px', fontSize: 15, lineHeight: 1.6, textAlign: 'center', fontFamily: FONT_STACK }}>{message}</p>
        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={onCancel} style={{ flex: 1, padding: '12px', borderRadius: 12, border: 'none', background: COLORS.bg, color: COLORS.text, fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: FONT_STACK }}>
            キャンセル
          </button>
          <button onClick={onConfirm} style={{ flex: 1, padding: '12px', borderRadius: 12, border: 'none', background: COLORS.miss, color: '#fff', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: FONT_STACK }}>
            {confirmLabel || 'OK'}
          </button>
        </div>
      </div>
    </div>
  );
}

// Shown when saving a session on a date that already has a recorded session.
// Lets the person choose whether to combine the two into one record, or
// keep today's new session as a separate entry on the same date.
function SameDayModal({ date, onMerge, onSeparate, onCancel }) {
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.32)', backdropFilter: 'blur(2px)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 50, padding: 24 }}>
      <div style={{ background: COLORS.card, borderRadius: 20, padding: '22px 22px 16px', maxWidth: 340, width: '100%', color: COLORS.text, boxShadow: '0 12px 28px rgba(0,0,0,0.18)' }}>
        <p style={{ margin: '0 0 6px', fontSize: 16, fontWeight: 700, textAlign: 'center', fontFamily: FONT_STACK }}>同じ日の記録があります</p>
        <p style={{ margin: '0 0 20px', fontSize: 13.5, lineHeight: 1.6, textAlign: 'center', color: COLORS.mutedDark, fontFamily: FONT_STACK }}>
          {formatDateLong(date)}にはすでに記録があります。今回の結果をどう保存しますか?
        </p>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <button onClick={onMerge} style={{ padding: '13px', borderRadius: 12, border: 'none', background: COLORS.accent, color: '#fff', fontSize: 14.5, fontWeight: 700, cursor: 'pointer', fontFamily: FONT_STACK }}>
            まとめて1日分にする
          </button>
          <button onClick={onSeparate} style={{ padding: '13px', borderRadius: 12, border: 'none', background: COLORS.bg, color: COLORS.text, fontSize: 14.5, fontWeight: 600, cursor: 'pointer', fontFamily: FONT_STACK }}>
            別の記録として保存する
          </button>
          <button onClick={onCancel} style={{ padding: '11px', borderRadius: 12, border: 'none', background: 'transparent', color: COLORS.mutedDark, fontSize: 13.5, fontWeight: 600, cursor: 'pointer', fontFamily: FONT_STACK }}>
            キャンセル
          </button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [loaded, setLoaded] = useState(false);
  const [sessions, setSessions] = useState([]);
  const [customClubs, setCustomClubs] = useState([]);
  const [screen, setScreen] = useState('home'); // home | select | input | result | history
  const [currentSession, setCurrentSession] = useState(null);
  const [selectedClub, setSelectedClub] = useState(null);
  const [homeMetric, setHomeMetric] = useState('overall');
  const [confirmState, setConfirmState] = useState(null);
  const [sameDayState, setSameDayState] = useState(null);
  const [expandedHistoryId, setExpandedHistoryId] = useState(null);
  const [showAddClub, setShowAddClub] = useState(false);
  const [newClubName, setNewClubName] = useState('');

  useEffect(() => {
    (async () => {
      const s = await loadKey(SESSIONS_KEY, []);
      const c = await loadKey(CLUBS_KEY, []);
      setSessions(Array.isArray(s) ? [...s].sort((a, b) => a.id - b.id) : []);
      setCustomClubs(Array.isArray(c) ? c : []);
      setLoaded(true);
    })();
  }, []);

  const allClubs = useMemo(() => {
    const set = new Set(CLUB_PRESETS);
    customClubs.forEach((c) => set.add(c));
    return [...set];
  }, [customClubs]);

  const clubsWithData = useMemo(() => {
    const set = new Set();
    sessions.forEach((s) => Object.keys(s.clubs).forEach((c) => set.add(c)));
    const ordered = CLUB_PRESETS.filter((c) => set.has(c));
    const customs = [...set].filter((c) => !CLUB_PRESETS.includes(c));
    return [...ordered, ...customs];
  }, [sessions]);

  const chartData = useMemo(() => {
    let filtered;
    if (homeMetric === 'overall') {
      filtered = sessions.map((s) => ({ date: s.date, score: s.overallScore }));
    } else {
      filtered = sessions
        .filter((s) => s.clubs[homeMetric])
        .map((s) => ({ date: s.date, score: s.clubs[homeMetric].score }));
    }
    return filtered
      .sort((a, b) => a.date.localeCompare(b.date))
      .map((d) => ({ label: formatDateShort(d.date), score: roundScore(d.score) }));
  }, [sessions, homeMetric]);

  const latestSession = sessions.length ? sessions[sessions.length - 1] : null;

  async function persistSessions(next) {
    setSessions(next);
    await saveKey(SESSIONS_KEY, next);
  }
  async function persistCustomClubs(next) {
    setCustomClubs(next);
    await saveKey(CLUBS_KEY, next);
  }

  function startPractice() {
    setCurrentSession({ date: todayISO(), clubs: {} });
    setSelectedClub(null);
    setScreen('select');
  }

  function selectClub(club) {
    setSelectedClub(club);
    setCurrentSession((prev) => {
      if (prev.clubs[club]) return prev;
      return { ...prev, clubs: { ...prev.clubs, [club]: emptyCounts() } };
    });
    setScreen('input');
  }

  function updateCount(club, key, delta) {
    setCurrentSession((prev) => {
      const counts = { ...(prev.clubs[club] || emptyCounts()) };
      counts[key] = Math.max(0, (counts[key] || 0) + delta);
      return { ...prev, clubs: { ...prev.clubs, [club]: counts } };
    });
  }

  function finishPractice() {
    setCurrentSession((prev) => {
      const clubsWithScores = {};
      Object.entries(prev.clubs).forEach(([club, counts]) => {
        if (totalCount(counts) > 0) {
          clubsWithScores[club] = { ...counts, score: computeClubScore(counts) };
        }
      });
      return { ...prev, clubs: clubsWithScores };
    });
    setScreen('result');
  }

  function saveSession() {
    const existing = sessions.find((s) => s.date === currentSession.date);
    if (existing) {
      setSameDayState({ existing });
      return;
    }
    commitNewSession();
  }

  // Saves currentSession as a brand-new entry (used when there's no same-day
  // conflict, or when the person explicitly chooses to keep it separate).
  function commitNewSession() {
    const overallScore = computeOverallScore(currentSession.clubs);
    const newSession = {
      id: Date.now(),
      date: currentSession.date,
      clubs: currentSession.clubs,
      overallScore,
    };
    persistSessions([...sessions, newSession]);
    setCurrentSession(null);
    setSelectedClub(null);
    setSameDayState(null);
    setScreen('home');
  }

  // Combines currentSession into the existing same-day session, summing raw
  // shot counts per club and recomputing scores from the combined totals.
  function commitMergedSession(existing) {
    const mergedClubs = mergeClubResults(existing.clubs, currentSession.clubs);
    const overallScore = computeOverallScore(mergedClubs);
    const updated = { ...existing, clubs: mergedClubs, overallScore };
    persistSessions(sessions.map((s) => (s.id === existing.id ? updated : s)));
    setCurrentSession(null);
    setSelectedClub(null);
    setSameDayState(null);
    setScreen('home');
  }

  function requestCancelPractice() {
    setConfirmState({
      message: '記録中のデータは失われます。練習をやめますか?',
      confirmLabel: 'やめる',
      onConfirm: () => {
        setCurrentSession(null);
        setSelectedClub(null);
        setConfirmState(null);
        setScreen('home');
      },
    });
  }

  function addCustomClub() {
    const name = newClubName.trim();
    if (!name) { setShowAddClub(false); return; }
    if (!allClubs.includes(name)) {
      persistCustomClubs([...customClubs, name]);
    }
    setNewClubName('');
    setShowAddClub(false);
    selectClub(name);
  }

  function requestDeleteSession(id) {
    setConfirmState({
      message: 'この記録を削除しますか?この操作は取り消せません。',
      confirmLabel: '削除する',
      onConfirm: () => {
        persistSessions(sessions.filter((s) => s.id !== id));
        setExpandedHistoryId(null);
        setConfirmState(null);
      },
    });
  }

  const anyDoneInSession = currentSession
    ? Object.values(currentSession.clubs).some((c) => totalCount(c) > 0)
    : false;

  // ---------- screens ----------
  function renderHome() {
    const altoState = getHomeAltoState(sessions);
    return (
      <>
        <div style={{ padding: '20px 20px 0' }}>
          <p style={{ fontFamily: FONT_STACK, fontSize: 30, letterSpacing: -0.5, fontWeight: 700, margin: 0, color: COLORS.text }}>Alto Golf</p>
          <p style={{ fontSize: 14, color: COLORS.mutedDark, margin: '4px 0 18px' }}>
            {latestSession ? `前回 ${formatDateLong(latestSession.date)} ・ ${roundScore(latestSession.overallScore)}点` : '打ちっぱなしの記録をつけて、成長を可視化しよう'}
          </p>
        </div>

        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10, padding: '0 20px 18px' }}>
          <AltoDog mood={altoState.mood} size={56} />
          <SpeechBubble>{altoState.message}</SpeechBubble>
        </div>

        {sessions.length === 0 ? (
          <div style={cardStyle}>
            <p style={{ fontSize: 14, lineHeight: 1.8, margin: '4px 0 16px', color: COLORS.mutedDark }}>
              まだ記録がありません。「練習を始める」をタップして、最初のセッションを記録しましょう。
            </p>
          </div>
        ) : (
          <>
            <RingLabel>スコアの推移</RingLabel>
            <div style={cardStyle}>
              <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 14 }}>
                <Chip active={homeMetric === 'overall'} label="全体" onClick={() => setHomeMetric('overall')} />
                {clubsWithData.map((c) => (
                  <Chip key={c} active={homeMetric === c} label={c} onClick={() => setHomeMetric(c)} />
                ))}
              </div>
              {chartData.length === 0 ? (
                <p style={{ fontSize: 13, color: COLORS.mutedDark, padding: '20px 0', textAlign: 'center' }}>このクラブの記録はまだありません</p>
              ) : (
                <ScoreAreaChart data={chartData} height={190} />
              )}
            </div>
          </>
        )}

        <div style={{ padding: '8px 20px 24px' }}>
          <button onClick={startPractice} style={primaryButton}>練習を始める</button>
        </div>
      </>
    );
  }

  function renderSelect() {
    if (!currentSession) return null;
    return (
      <>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 20px 4px' }}>
          <button onClick={requestCancelPractice} style={iconBtnStyle}><IconX size={22} /></button>
          <p style={{ fontSize: 13, color: COLORS.mutedDark, margin: 0 }}>{formatDateLong(currentSession.date)}</p>
          <div style={{ width: 34 }} />
        </div>
        <div style={{ padding: '8px 20px 4px' }}>
          <p style={{ fontSize: 22, fontWeight: 700, letterSpacing: -0.3, margin: '8px 0 4px', color: COLORS.text }}>クラブを選ぶ</p>
          <p style={{ fontSize: 14, color: COLORS.mutedDark, margin: '0 0 18px' }}>練習するクラブをタップして、結果を記録しましょう</p>
        </div>

        <div style={{ padding: '0 20px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
            {allClubs.map((club) => {
              const done = currentSession.clubs[club] && totalCount(currentSession.clubs[club]) > 0;
              return (
                <button
                  key={club}
                  onClick={() => selectClub(club)}
                  style={{
                    position: 'relative',
                    border: 'none',
                    borderRadius: 14,
                    background: done ? COLORS.fairwaySoft : COLORS.card,
                    color: done ? COLORS.fairway : COLORS.text,
                    padding: '15px 4px',
                    fontSize: 14,
                    fontWeight: 600,
                    cursor: 'pointer',
                    fontFamily: FONT_STACK,
                    boxShadow: '0 1px 2px rgba(0,0,0,0.04)',
                  }}
                >
                  {club}
                  {done && (
                    <span style={{ position: 'absolute', top: -6, right: -6, background: COLORS.fairway, borderRadius: '50%', width: 20, height: 20, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 1px 3px rgba(0,0,0,0.15)' }}>
                      <IconCheck size={12} color="#fff" />
                    </span>
                  )}
                </button>
              );
            })}
            <button
              onClick={() => setShowAddClub(true)}
              style={{ border: 'none', borderRadius: 14, background: 'transparent', color: COLORS.mutedDark, padding: '15px 4px', fontSize: 13, fontWeight: 600, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, fontFamily: FONT_STACK }}
            >
              <IconPlus size={16} />
              追加
            </button>
          </div>

          {showAddClub && (
            <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
              <input
                autoFocus
                value={newClubName}
                onChange={(e) => setNewClubName(e.target.value)}
                placeholder="クラブ名(例: 4I)"
                style={inputStyle}
                onKeyDown={(e) => { if (e.key === 'Enter') addCustomClub(); }}
              />
              <button onClick={addCustomClub} style={{ ...primaryButton, width: 'auto', padding: '10px 16px' }}>追加</button>
            </div>
          )}
        </div>

        <div style={{ padding: '24px 20px 24px' }}>
          <button
            onClick={finishPractice}
            disabled={!anyDoneInSession}
            style={{ ...primaryButton, opacity: anyDoneInSession ? 1 : 0.4, cursor: anyDoneInSession ? 'pointer' : 'default' }}
          >
            練習を終える
          </button>
        </div>
      </>
    );
  }

  function renderInput() {
    if (!currentSession || !selectedClub) return null;
    const counts = currentSession.clubs[selectedClub] || emptyCounts();
    const total = totalCount(counts);
    const pastScores = sessions
      .filter((s) => s.clubs[selectedClub])
      .map((s) => s.clubs[selectedClub].score);
    const avg = pastScores.length ? pastScores.reduce((a, b) => a + b, 0) / pastScores.length : null;
    const last = pastScores.length ? pastScores[pastScores.length - 1] : null;

    return (
      <>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 20px 4px' }}>
          <button onClick={() => setScreen('select')} style={iconBtnStyle}><IconChevronLeft size={24} /></button>
          <p style={{ fontSize: 13, color: COLORS.mutedDark, margin: 0 }}>目安 5〜10球</p>
          <button onClick={requestCancelPractice} style={iconBtnStyle}><IconX size={22} /></button>
        </div>

        <div style={{ padding: '8px 20px 16px' }}>
          <p style={{ fontFamily: FONT_STACK, fontSize: 28, fontWeight: 700, letterSpacing: -0.5, margin: '4px 0', color: COLORS.text }}>{selectedClub}</p>
        </div>

        <RingLabel>これまでの成績</RingLabel>
        <div style={cardStyle}>
          {pastScores.length === 0 ? (
            <p style={{ fontSize: 13, color: COLORS.mutedDark, margin: '0 0 12px' }}>まだ記録がありません。今回が最初の記録です。</p>
          ) : (
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', paddingBottom: 10 }}>
              <Sparkline scores={pastScores} />
              <div style={{ textAlign: 'right' }}>
                <p style={{ margin: 0, fontSize: 12, color: COLORS.mutedDark }}>平均 <span style={{ fontFamily: FONT_ROUNDED, fontWeight: 700, fontSize: 16, color: COLORS.text }}>{roundScore(avg)}</span>点</p>
                <p style={{ margin: '4px 0 0', fontSize: 12, color: COLORS.mutedDark }}>前回 <span style={{ fontFamily: FONT_ROUNDED, fontWeight: 700, fontSize: 16, color: COLORS.text }}>{roundScore(last)}</span>点</p>
              </div>
            </div>
          )}
        </div>

        <div style={{ padding: '0 20px' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {RESULT_TYPES.map((rt) => {
              const isNice = rt.key === 'nice';
              const count = counts[rt.key] || 0;
              return (
                <button
                  key={rt.key}
                  onClick={() => updateCount(selectedClub, rt.key, 1)}
                  style={{
                    position: 'relative',
                    border: 'none',
                    borderRadius: 16,
                    background: isNice ? COLORS.fairway : COLORS.card,
                    color: isNice ? '#fff' : COLORS.text,
                    padding: '16px 8px',
                    cursor: 'pointer',
                    display: 'flex',
                    flexDirection: 'column',
                    alignItems: 'center',
                    gap: 4,
                    fontFamily: FONT_STACK,
                    boxShadow: isNice ? 'none' : '0 1px 2px rgba(0,0,0,0.04)',
                  }}
                >
                  <span style={{ fontSize: 13, fontWeight: 600 }}>{rt.label}</span>
                  <span style={{ fontFamily: FONT_ROUNDED, fontSize: 28, fontWeight: 700, lineHeight: 1.1, color: isNice ? '#fff' : (count > 0 ? COLORS.fairway : COLORS.text) }}>{count}</span>
                  {count > 0 && (
                    <span
                      onClick={(e) => { e.stopPropagation(); updateCount(selectedClub, rt.key, -1); }}
                      style={{ position: 'absolute', top: 8, right: 8, width: 22, height: 22, borderRadius: '50%', background: isNice ? 'rgba(255,255,255,0.25)' : 'rgba(60,60,67,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
                    >
                      <IconMinus size={12} color={isNice ? '#fff' : COLORS.text} />
                    </span>
                  )}
                </button>
              );
            })}
          </div>
          <p style={{ fontSize: 12, color: COLORS.mutedDark, textAlign: 'center', margin: '14px 0 0' }}>合計 {total} 球</p>
        </div>

        <div style={{ padding: '20px 20px 24px', display: 'flex', flexDirection: 'column', gap: 10 }}>
          <button onClick={() => setScreen('select')} style={secondaryButton}>次のクラブへ</button>
          <button
            onClick={finishPractice}
            disabled={!anyDoneInSession}
            style={{ ...primaryButton, opacity: anyDoneInSession ? 1 : 0.4, cursor: anyDoneInSession ? 'pointer' : 'default' }}
          >
            練習を終える
          </button>
        </div>
      </>
    );
  }

  function renderResult() {
    if (!currentSession) return null;
    const clubEntries = Object.entries(currentSession.clubs);
    const overall = clubEntries.length
      ? clubEntries.reduce((sum, [, c]) => sum + c.score, 0) / clubEntries.length
      : 0;
    const altoState = getResultAltoState(currentSession);

    return (
      <>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '16px 20px 4px' }}>
          <button onClick={() => setScreen('select')} style={iconBtnStyle}><IconChevronLeft size={24} /></button>
          <p style={{ fontSize: 13, color: COLORS.mutedDark, margin: 0 }}>{formatDateLong(currentSession.date)}</p>
          <div style={{ width: 34 }} />
        </div>

        <div style={{ padding: '8px 20px 0', textAlign: 'center' }}>
          <p style={{ fontSize: 12, color: COLORS.mutedDark, margin: '0 0 2px', letterSpacing: 0.6, fontWeight: 600, textTransform: 'uppercase' }}>Today's Score</p>
          <p style={{ fontFamily: FONT_ROUNDED, fontSize: 60, fontWeight: 700, letterSpacing: -1, margin: 0, color: scoreColor(overall) }}>{roundScore(overall)}</p>
        </div>

        <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10, padding: '14px 20px 18px' }}>
          <AltoDog mood={altoState.mood} size={56} />
          <SpeechBubble>{altoState.message}</SpeechBubble>
        </div>

        <RingLabel>クラブ別スコア</RingLabel>
        <div style={cardStyle}>
          {clubEntries.map(([club, c], i) => (
            <div key={club} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '11px 0', borderBottom: i < clubEntries.length - 1 ? `1px solid ${COLORS.border}` : 'none' }}>
              <span style={{ fontSize: 15, fontWeight: 500 }}>{club}</span>
              <span style={{ fontFamily: FONT_ROUNDED, fontSize: 17, fontWeight: 700, color: scoreColor(c.score) }}>{roundScore(c.score)}<span style={{ fontSize: 12, fontWeight: 400, marginLeft: 2, color: COLORS.mutedDark }}>点</span></span>
            </div>
          ))}
        </div>

        <div style={{ padding: '8px 20px 24px' }}>
          <button onClick={saveSession} style={primaryButton}>保存する</button>
        </div>
      </>
    );
  }

  function renderHistory() {
    const sorted = [...sessions].sort((a, b) => b.id - a.id);
    return (
      <>
        <div style={{ padding: '20px 20px 16px' }}>
          <p style={{ fontFamily: FONT_STACK, fontSize: 30, letterSpacing: -0.5, fontWeight: 700, margin: 0, color: COLORS.text }}>履歴</p>
        </div>

        {sorted.length === 0 ? (
          <div style={cardStyle}>
            <p style={{ fontSize: 14, lineHeight: 1.8, margin: '4px 0 16px', color: COLORS.mutedDark }}>まだ記録がありません。</p>
          </div>
        ) : (
          sorted.map((session) => {
            const expanded = expandedHistoryId === session.id;
            return (
              <div key={session.id} style={{ ...cardStyle, padding: 0, overflow: 'hidden' }}>
                <button
                  onClick={() => setExpandedHistoryId(expanded ? null : session.id)}
                  style={{ width: '100%', border: 'none', background: 'transparent', padding: '15px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer', fontFamily: FONT_STACK }}
                >
                  <span style={{ fontSize: 15, fontWeight: 500, color: COLORS.text }}>{formatDateLong(session.date)}</span>
                  <span style={{ fontFamily: FONT_ROUNDED, fontSize: 19, fontWeight: 700, color: scoreColor(session.overallScore) }}>{roundScore(session.overallScore)}点</span>
                </button>
                {expanded && (
                  <div style={{ padding: '0 16px 16px' }}>
                    {Object.entries(session.clubs).map(([club, c]) => (
                      <div key={club} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: `1px solid ${COLORS.border}`, fontSize: 13 }}>
                        <span style={{ color: COLORS.mutedDark }}>{club}</span>
                        <span style={{ fontWeight: 700, color: scoreColor(c.score) }}>{roundScore(c.score)}点</span>
                      </div>
                    ))}
                    <button
                      onClick={() => requestDeleteSession(session.id)}
                      style={{ marginTop: 14, border: 'none', background: 'transparent', color: COLORS.miss, fontSize: 13, fontWeight: 600, cursor: 'pointer', padding: 0, fontFamily: FONT_STACK }}
                    >
                      この記録を削除
                    </button>
                  </div>
                )}
              </div>
            );
          })
        )}
        <div style={{ height: 8 }} />
      </>
    );
  }

  if (!loaded) {
    return (
      <div style={{ minHeight: '100vh', background: COLORS.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', color: COLORS.text, fontFamily: FONT_STACK }}>
        読み込み中…
      </div>
    );
  }

  const showBottomNav = screen === 'home' || screen === 'history';

  return (
    <div style={{ minHeight: '100vh', background: COLORS.bg, color: COLORS.text, fontFamily: FONT_STACK, maxWidth: 480, margin: '0 auto', paddingBottom: showBottomNav ? 78 : 12, position: 'relative' }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; }
        input::placeholder { color: ${COLORS.mutedDark}; }
        @keyframes alto-tail-wag { 0%, 100% { transform: rotate(-8deg); } 50% { transform: rotate(10deg); } }
        .alto-tail-wag { transform-origin: 70.4% 59%; animation: alto-tail-wag 0.9s ease-in-out infinite; }
        @keyframes alto-ear-left-flick { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(-9deg); } }
        @keyframes alto-ear-right-flick { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(9deg); } }
        .alto-ear-left { transform-origin: 21.7% 18.5%; animation: alto-ear-left-flick 2.4s ease-in-out infinite; }
        .alto-ear-right { transform-origin: 43.5% 18.5%; animation: alto-ear-right-flick 2.4s ease-in-out infinite 0.25s; }
      `}</style>

      {screen === 'home' && renderHome()}
      {screen === 'select' && renderSelect()}
      {screen === 'input' && renderInput()}
      {screen === 'result' && renderResult()}
      {screen === 'history' && renderHistory()}

      {showBottomNav && (
        <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, maxWidth: 480, margin: '0 auto', background: 'rgba(255,255,255,0.86)', backdropFilter: 'blur(20px)', display: 'flex', borderTop: `1px solid ${COLORS.border}` }}>
          <NavButton active={screen === 'home'} onClick={() => setScreen('home')} icon={<IconHome size={20} strokeWidth={2.2} />} label="ホーム" />
          <NavButton active={screen === 'history'} onClick={() => setScreen('history')} icon={<IconHistory size={20} strokeWidth={2.2} />} label="履歴" />
        </div>
      )}

      {confirmState && (
        <ConfirmModal
          message={confirmState.message}
          confirmLabel={confirmState.confirmLabel}
          onConfirm={confirmState.onConfirm}
          onCancel={() => setConfirmState(null)}
        />
      )}

      {sameDayState && (
        <SameDayModal
          date={sameDayState.existing.date}
          onMerge={() => commitMergedSession(sameDayState.existing)}
          onSeparate={commitNewSession}
          onCancel={() => setSameDayState(null)}
        />
      )}
    </div>
  );
}

function Chip({ active, label, onClick }) {
  return (
    <button
      onClick={onClick}
      style={{
        flexShrink: 0,
        border: 'none',
        borderRadius: 999,
        padding: '7px 16px',
        fontSize: 13,
        fontWeight: 600,
        cursor: 'pointer',
        background: active ? COLORS.accent : COLORS.bg,
        color: active ? '#fff' : COLORS.mutedDark,
        fontFamily: FONT_STACK,
      }}
    >
      {label}
    </button>
  );
}

function NavButton({ active, onClick, icon, label }) {
  return (
    <button
      onClick={onClick}
      style={{
        flex: 1,
        border: 'none',
        background: 'transparent',
        padding: '10px 0 16px',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        gap: 3,
        cursor: 'pointer',
        color: active ? COLORS.accent : COLORS.mutedDark,
        fontFamily: FONT_STACK,
        fontSize: 11,
        fontWeight: 600,
      }}
    >
      {icon}
      {label}
    </button>
  );
}

try {
  if (typeof setStatus === 'function') setStatus('mounting App…');
  const rootEl = document.getElementById('root');
  ReactDOM.createRoot(rootEl).render(<App />);
  if (typeof setStatus === 'function') {
    setStatus('OK');
    setTimeout(() => setStatus(''), 1500);
  }
} catch (err) {
  if (typeof showBootError === 'function') {
    showBootError('App描画エラー: ' + (err && err.message ? err.message : String(err)) + '\n' + (err && err.stack ? err.stack : ''));
  }
  throw err;
}
</script>
<script>
  (function () {
    setStatus('compiling…');
    try {
      var src = document.getElementById('app-source').textContent;
      var compiled = Babel.transform(src, {
        presets: [['react', { runtime: 'classic' }]]
      }).code;
      setStatus('mounting…');
      var run = new Function('React', 'ReactDOM', 'setStatus', 'showBootError', compiled);
      run(window.React, window.ReactDOM, window.setStatus, window.showBootError);
    } catch (err) {
      showBootError('コンパイル/実行エラー: ' + (err && err.message ? err.message : String(err)) + '\n' + (err && err.stack ? err.stack : ''));
    }
  })();
</script>
</body>
